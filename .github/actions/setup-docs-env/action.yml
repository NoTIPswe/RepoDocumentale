name: "Setup Docs Environment"
description: "Bootstraps UTF-8 locale and Python virtualenv dependencies for docs workflows."

runs:
  using: "composite"
  steps:
    - name: Trust checked-out workspace for Git commands
      run: |
        workspace_path="${GITHUB_WORKSPACE:-$PWD}"
        git config --global --add safe.directory "$workspace_path"
      shell: bash

    - name: Configure UTF-8 locale
      run: |
        echo "LANG=C.UTF-8" >> "$GITHUB_ENV"
        echo "LC_ALL=C.UTF-8" >> "$GITHUB_ENV"
        echo "PYTHONUTF8=1" >> "$GITHUB_ENV"
      shell: bash

    - name: Create virtual environment
      run: |
        python3 -m venv .venv
        echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      shell: bash

    - name: Install Python dependencies
      run: pip install -r notipdo/requirements.txt
      shell: bash

    - name: Install `notipdo` tool
      run: pip install -e notipdo/
      shell: bash
