#Per inserire i test nel sotto capitolo mettere sotto id "component: _vostro servizio_"
#component e' opzionale, nel caso non venga messo il test verra' messo sotto il capitolo "test di sistema"
#il titolo del capitolo sara' come il nome del component, quindi deve essere uguale per tutti i test del singolo servizio
#_esempio_
#- id: t_s_x
#  component: Provisioning service
#  description: "des"
#  requirements:
#  - req
#  status: not_implemented

type: system
tests:
- id: t_s_001
  description: Verificare che un utente non autenticato possa accedere al Sistema inserendo credenziali
    valide tramite interfaccia UI
  requirements:
  - login
  - ins_pw
  - ins_mail
  status: not_implemented
- id: t_s_002
  description: Verificare che il Sistema neghi l’accesso e mostri un messaggio di errore in caso di credenziali
    errate
  requirements:
  - err_cred_errate
  status: not_implemented
- id: t_s_003
  description: Verificare che il sistema notifichi un errore in caso di password inserite non corrispondenti
    o non valide
  requirements:
  - err_campi_diversi
  - err_password_invalida
  status: not_implemented
- id: t_s_004
  description: Verificare che un utente autenticato possa modificare la propria email, con corretta validazione
    del formato, segnalazione di duplicati e richiesta di conferma
  requirements:
  - modifica_mail_account
  - impostazione_mail
  - err_mail_non_valida
  - err_mail_gia_registrata
  status: not_implemented
- id: t_s_005
  description: Verificare che un utente autenticato possa modificare la password del proprio account
  requirements:
  - modifica_password_account
  status: not_implemented
- id: t_s_006
  description: Verificare che un utente autenticato possa effettuare il logout dal Sistema
  requirements:
  - logout
  status: not_implemented
- id: t_s_007
  description: Verificare che un utente autenticato possa visualizzare la lista dei Gateway associati
    al proprio Tenant
  requirements:
  - visualizzazione_lista_gateway_tenant
  status: not_implemented
- id: t_s_008
  description: Verificare che il sistema mostri correttamente nome, stato, timestamp dell’ultimo invio
    dati e lista sensori di un Gateway selezionato
  requirements:
  - visualizzazione_singolo_gateway_tenant
  - visualizzazione_dettagli_gateway
  status: not_implemented
- id: t_s_009
  description: Verificare che il sistema mostri la lista dei sensori associati a un Gateway
  requirements:
  - visualizzazione_singolo_sensore
  status: not_implemented
- id: t_s_010
  description: Verificare che il sistema mostri correttamente l’ID e l’ultimo timestamp di invio dati
    di ciascun sensore
  requirements:
  - visualizzazione_singolo_sensore
  status: not_implemented
- id: t_s_011
  description: Verificare che il sistema visualizzi i dati di stream in formato tabellare
  requirements:
  - visualizzazione_dati_stream
  - visualizzazione_tabellare_dati_stream
  status: not_implemented
- id: t_s_012
  description: Verificare che il sistema visualizzi i dati di stream in formato grafico
  requirements:
  - visualizzazione_dati_stream
  - visualizzazione_grafico_dati_stream
  status: not_implemented
- id: t_s_013
  description: Verificare che l’utente possa filtrare i dati per Gateway, sensore e intervallo temporale
  requirements:
  - filtraggio_gateway
  - filtraggio_sensore
  - filtraggio_intervallo_temporale
  status: not_implemented
- id: t_s_014
  description: Verificare che il sistema notifichi l’utente quando non sono disponibili dati per i filtri
    selezionati
  requirements:
  - err_dati_non_disponibili
  status: not_implemented
- id: t_s_015
  description: Verificare che l’utente possa esportare i dati visualizzati in formato supportato
  requirements:
  - esportazione_dati
  status: not_implemented
- id: t_s_016
  description: Verificare che il sistema generi un alert in caso di Gateway non raggiungibile
  requirements:
  - alert_gateway_irraggiungibile
  status: not_implemented
- id: t_s_017
  description: Verificare che l’utente possa visualizzare lo storico degli alert generati
  requirements:
  - visualizzazione_storico_alert
  status: not_implemented
- id: t_s_018
