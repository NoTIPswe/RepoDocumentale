- id: esportazione_log_audit_tenant_sysadmin
  title: Esportazione log di Audit di un Tenant
  actors:
    primary:
    - sys-adm
  preconditions:
  - Il Sistema si trova nella sezione dedicata alla visualizzazione dei Tenant
  - Esiste un Tenant che è stato selezionato
  - L’Attore entra nella relativa sezione di Gestione
  postconditions:
  - L’Attore scarica i log di Audit del tenant
  main_scenario:
  - description: L’Attore seleziona un Tenant
    include: selezione_tenant
  - description: L’Attore esporta i log di Audit del Tenant selezionato
    include: esportazione_log_audit_tenant
  subcases:
  - id: esportazione_log_audit_tenant
    title: Esportazione log di Audit del Tenant
    actors:
      primary:
      - tenant-adm
      - sys-adm
    preconditions:
    - Esiste un Tenant che è stato selezionato
    - Il Sistema mostra all'Attore primario i log di Audit del Tenant
    postconditions:
    - L’Attore esporta correttamente i dati di suo interesse
    main_scenario:
    - description: L’Attore seleziona un Tenant
      include: selezione_tenant
    - description: L’Attore seleziona l’intervallo temporale (data e ora) degli Audit da esportare
      include: selezione_intervallo_temporale
    - description: L’Attore conferma l’esportazione per avviare la procedura
    - description: L’Attore scarica i log di Audit non appena sono pronti
      include: download_log_audit_esportati
    subcases:
    - id: selezione_intervallo_temporale
      title: Selezione intervallo temporale
      actors:
        primary:
        - tenant-adm
        - sys-adm
      preconditions:
      - Il Sistema mostra all'Attore primario i log di Audit del Tenant
      postconditions:
      - L’Attore ha selezionato un intervallo temporale valido
      main_scenario:
      - description: L’Attore seleziona un timestamp minimo
      - description: L’Attore seleziona un timestamp massimo (maggiore del minimo)
    - id: download_log_audit_esportati
      title: Download log Audit esportati
      actors:
        primary:
        - tenant-adm
        - sys-adm
      preconditions:
      - Il Sistema mostra all'Attore primario i log di Audit del Tenant
      - Il Sistema ha prodotto il file scaricabile contenente i log di Audit esportati
      postconditions:
      - L’Attore scarica i log sul proprio dispositivo
      main_scenario:
      - description: L’Attore viene notificato della disponibilità del log esportato
      - description: L’Attore scarica il file di log sul proprio dispositivo
- id: modifica_impostazioni_impersonificazione
