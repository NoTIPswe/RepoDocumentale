- id: ricezione_alert_sensore_fuori_range
  title: Ricezione alert sensore fuori range
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il sensore è associato a un Gateway attivo del Tenant dell'Attore
  - La sessione è attiva
  - Il valore misurato dal sensore supera il range di allarme configurato
  postconditions:
  - L'Attore viene notificato del dato anomalo rilevato
  main_scenario:
  - description: Il Sistema notifica l’Attore del valore fuori range
  - description: L’Attore visualizza l'ID del sensore interessato
    include: visualizzazione_id_sensore
  - description: L’Attore visualizza il Tenant ID del Gateway a cui è associato il sensore
    include: visualizzazione_id_tenant_gateway
  - description: L’Attore visualizza il valore del dato registrato fuori range
    include: visualizzazione_valore_dato_registrato
  - description: L’Attore visualizza l'orario di registrazione del dato
    include: visualizzazione_timestamp_dato
  - description: L'Attore visualizza il range accettato previsto per il sensore
    include: visualizzazione_range_accettato
  - description: L'Attore visualizza il tipo del sensore
    include: visualizzazione_tipo_sensore

- id: scadenza_sessione
  title: Scadenza sessione
  actors:
    primary:
    - authd-usr
  preconditions:
  - L'Attore è autenticato nel Sistema
  - Il token di sessione è scaduto per superamento del tempo massimo di validità o inattività
  postconditions:
  - La sessione dell'Attore viene invalidata dal Sistema
  - L'Attore viene reindirizzato alla schermata di login
  main_scenario:
  - description: Il Sistema rileva la scadenza del token di sessione dell'Attore
  - description: Il Sistema invalida la sessione corrente
  - description: L'Attore viene reindirizzato automaticamente alla pagina di login

- id: err_tenant_sospeso
  title: Errore accesso Tenant sospeso
  actors:
    primary:
    - non-authd-usr
  preconditions:
  - L'Attore ha fornito credenziali primarie valide in fase di autenticazione
  - Il Tenant di appartenenza dell'account risulta in stato sospeso
  postconditions:
  - Viene negato l'accesso al Sistema
  - L'Attore viene informato del blocco
  main_scenario:
  - description: L'Attore viene informato in fase di autenticazione che l'accesso non è stato consentito

- id: ricezione_risoluzione_alert_gateway
  title: Ricezione risoluzione alert Gateway raggiungibile
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Esiste un alert attivo di tipo Gateway non raggiungibile per un Gateway del Tenant
  - Il Gateway ha ripreso la comunicazione con il Cloud entro i timeout configurati
  - La sessione è attiva
  postconditions:
  - L'Attore vede che il Gateway è di nuovo raggiungibile
  main_scenario:
  - description: L’Attore visualizza il nome del Gateway interessato
    include: visualizzazione_nome_gateway_tenant
  - description: L’Attore visualizza il stato del Gateway come “Online"
    include: visualizzazione_stato_gateway_tenant

- id: visualizzazione_profilo_personale
