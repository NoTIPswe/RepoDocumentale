  actors:
    primary:
    - sys-adm
  preconditions:
  - Il Gateway esiste ed è operativo, ma non ancora configurato
  - L’Attore possiede credenziali di fabbrica del gateway
  - Il Tenant a cui si desidera associare il gateway è attivo
  postconditions:
  - Il Gateway è stato provisionato correttamente nel Sistema
  - Il Gateway è stato associato correttamente al Tenant
  - Il Gateway è posto in stato “not provisioned” con nome e id generati automaticamente
  main_scenario:
  - description: L’Attore seleziona un Tenant attivo dalla lista
    include: selezione_tenant
  - description: L’Attore inserisce le credenziali di fabbrica del Gateway
    include: inserimento_credenziali_fabbrica_gateway
  - description: L’Attore conferma l’operazione
  - description: L’Attore viene notificato dell’avvenuta connessione del Gateway non appena il dispositivo
      contatta il Cloud e riceve le credenziali
