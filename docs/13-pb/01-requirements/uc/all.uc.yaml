system: cloud
use_cases:
- id: login
  title: Login
  actors:
    primary:
    - non-authd-usr
  preconditions:
  - Esiste almeno un account registrato nel Sistema
  - L'Attore non è autenticato nel Sistema
  postconditions:
  - L'Attore è autenticato correttamente
  - L'Attore è autorizzato correttamente
  main_scenario:
  - description: L'Attore inserisce la mail per l'accesso
    include: ins_mail
  - description: L'Attore inserisce la password per l'accesso
    include: ins_pw
  - description: L'Attore richiede l'esecuzione del login
    extension_point: PreLogin
  - description: L'Attore accede correttamente al Sistema
  extensions:
  - extension_point: PreLogin
    condition: L'Attore inserisce credenziali errate
    uc: err_cred_errate
  subcases:
  - id: ins_pw
    title: Inserimento password
    actors:
      primary:
      - non-authd-usr
    preconditions:
    - Esiste almeno un account registrato nel Sistema
    - L'Attore non è autenticato nel Sistema
    - Il Sistema ha acquisito una mail associata a un account esistente
    postconditions:
    - L'Attore ha inserito una password
    main_scenario:
    - description: L'Attore inserisce la password
- id: err_cred_errate
  title: Errore credenziali errate
  actors:
    primary:
    - non-authd-usr
  preconditions:
  - Le credenziali primarie fornite non risultano valide per alcun account registrato
  postconditions:
  - Viene negato l'accesso al Sistema
  - L'Attore viene informato dell'errore
  main_scenario:
  - description: L'Attore viene informato del problema in fase di autenticazione
- id: impostazione_password
  title: Impostazione password
  actors:
    primary:
    - non-authd-usr
    - authd-usr
  preconditions:
  - Il Sistema richiede l’impostazione di una nuova password per l’account
  postconditions:
  - Password validata e salvata
  main_scenario:
  - description: L'Attore inserisce la password
    include: inserimento_nuova_password
  - description: L'Attore conferma la password
    include: conferma_nuova_password
  subcases:
  - id: inserimento_nuova_password
    title: Inserimento nuova password
    actors:
      primary:
      - non-authd-usr
      - authd-usr
    preconditions:
    - Il Sistema richiede all'Attore di definire una password
    postconditions:
    - La password inserita risulta sintatticamente valida e rispetta i criteri di sicurezza
    main_scenario:
    - description: L'Attore inserisce la stringa della password
      extension_point: PasswordInvalida
    extensions:
    - extension_point: PasswordInvalida
      condition: La password inserita non rispetta le policy di sicurezza del Sistema (es. lunghezza minima,
        presenza di caratteri speciali)
      uc: err_password_invalida
  - id: conferma_nuova_password
    title: Conferma nuova password
    actors:
      primary:
      - non-authd-usr
      - authd-usr
    preconditions:
    - L'Attore ha compilato il campo precedente con una password valida
    postconditions:
    - La password inserita come conferma coincide con la password originale
    main_scenario:
    - description: L'Attore inserisce nuovamente la stringa nel campo di conferma
      extension_point: PasswordDiverse
    extensions:
    - extension_point: PasswordDiverse
      condition: La stringa inserita nel campo di conferma non corrisponde a quella inserita in precedenza
      uc: err_campi_diversi
- id: err_campi_diversi
  title: Errore campi non corrispondenti
  actors:
    primary:
    - non-authd-usr
    - authd-usr
  preconditions:
  - I valori in input da validare attraverso ripetizione non coincidono
  postconditions:
  - Viene richiesta una nuova compilazione del campo
  main_scenario:
  - description: L'Attore viene notificato della differenza nelle due stringhe inserite
  - description: L'Attore viene invitato a ricompilare
- id: err_password_invalida
  title: Errore password non valida
  actors:
    primary:
    - non-authd-usr
    - authd-usr
  preconditions:
  - La password fornita non soddisfa i criteri di validazione definiti dal Sistema
  postconditions:
  - La password inserita viene rifiutata
  main_scenario:
  - description: L’Attore viene notificato che la password inserita non è valida e viene invitato a sceglierne
      un’altra
- id: modifica_mail_account
  title: Modifica mail account
  actors:
    primary:
    - authd-usr
  preconditions:
  - Il limite di cambi mail dell'account in analisi in un dato periodo di tempo non è stato superato
  postconditions:
  - L’Attore ha correttamente modificato la mail del proprio account
  main_scenario:
  - description: L’Attore inserisce la nuova mail
    include: impostazione_mail
  - description: L’Attore conferma l’operazione di cambio mail
- id: impostazione_mail
  title: Impostazione mail
  actors:
    primary:
    - authd-usr
  preconditions:
  - Il Sistema richiede l’inserimento di una nuova mail per l’account
  postconditions:
  - L’indirizzo mail inserito è stato validato
  main_scenario:
  - description: L'Attore inserisce la mail nel campo dedicato
    include: inserimento_nuova_mail
  - description: L'Attore conferma la mail reinserendolo nel campo apposito
    include: conferma_nuova_mail
  subcases:
  - id: inserimento_nuova_mail
    title: Inserimento mail
    actors:
      primary:
      - authd-usr
    preconditions:
    - Il Sistema richiede all'Attore di inserire un nuovo indirizzo mail
    postconditions:
    - L’indirizzo mail inserito è sintatticamente valido e non risulta associato ad altri account
    main_scenario:
    - description: L’Attore inserisce l’indirizzo mail nel campo dedicato
      extension_point: MailInvalida
    extensions:
    - extension_point: MailInvalida
      condition: L’Attore inserisce una mail non valida
      uc: err_mail_non_valida
    - extension_point: MailInvalida
      condition: L’Attore inserisce una mail già associata ad un altro account
      uc: err_mail_gia_registrata
  - id: conferma_nuova_mail
    title: Conferma mail
    actors:
      primary:
      - authd-usr
    preconditions:
    - L'Attore ha compilato il campo precedente con una mail valida e disponibile
    postconditions:
    - La mail inserita come conferma coincide con la mail originale
    main_scenario:
    - description: L’Attore conferma l’indirizzo mail reinserendolo nel campo apposito
      extension_point: FallimentoValidazione
    extensions:
    - extension_point: FallimentoValidazione
      condition: L’Attore inserisce due valori diversi nei due campi
      uc: err_campi_diversi
- id: err_mail_non_valida
  title: Errore mail non valida
  actors:
    primary:
    - authd-usr
  preconditions:
  - La mail fornita non rispetta il formato valido richiesto dal Sistema
  postconditions:
  - La mail inserita viene rifiutata
  main_scenario:
  - description: L’Attore viene notificato che l’email inserita non è valida ed invitato a inserirla nuovamente
- id: err_mail_gia_registrata
  title: Errore mail duplicata
  actors:
    primary:
    - authd-usr
  preconditions:
  - La mail fornita risulta già associata a un altro account registrato nel Tenant
  postconditions:
  - L’indirizzo mail non viene memorizzato
  main_scenario:
  - description: L’Attore viene notificato che la mail è già presente all'interno del Tenant
  - description: L'Attore viene invitato ad inserirne una nuova
- id: modifica_password_account
  title: Modifica password account
  actors:
    primary:
    - authd-usr
  preconditions:
  - L’Attore rispetta il limite di cambi password in un dato periodo
  postconditions:
  - La password dell’account è stata aggiornata
  main_scenario:
  - description: L’Attore inserisce la nuova password
    include: impostazione_password
  - description: L’Attore conferma l’operazione di cambio password
- id: logout
  title: Logout
  actors:
    primary:
    - authd-usr
  preconditions:
  - Non ci sono interazioni in corso tra Sistema e Attore
  postconditions:
  - La sessione viene riavviata e si torna al login
  main_scenario:
  - description: L’Attore seleziona la funzionalità di logout
  - description: L’Attore conferma l’operazione di logout
- id: visualizzazione_lista_gateway_tenant
  title: Visualizzazione lista Gateway Tenant
  actors:
    primary:
    - tenant-usr
  preconditions:
  - L'Attore è autenticato e ha accesso autorizzato alle risorse del proprio Tenant
  postconditions:
  - L'Attore visualizza l'elenco di tutti i Gateway associati al suo Tenant
  main_scenario:
  - description: L'Attore accede alla sezione dedicata alla visualizzazione dei dispositivi
  - description: L'Attore visualizza la lista dei Gateway associati al proprio Tenant
    include: visualizzazione_singolo_gateway_tenant
  subcases:
  - id: visualizzazione_singolo_gateway_tenant
    title: Visualizzazione singolo Gateway Tenant
    actors:
      primary:
      - tenant-usr
    preconditions:
    - Il Sistema mostra la lista dei Gateway associati al Tenant dell'Attore
    postconditions:
    - L'Attore visualizza, nel singolo elemento della lista, nome e stato del Gateway
    main_scenario:
    - description: Il Sistema mostra il nome identificativo del Gateway
      include: visualizzazione_nome_gateway_tenant
    - description: Il Sistema mostra la condizione operativa attuale
      include: visualizzazione_stato_gateway_tenant
- id: visualizzazione_nome_gateway_tenant
  title: Visualizzazione nome Gateway Tenant
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il Sistema presenta all’Attore una lista di Gateway, i dettagli di un Gateway oppure un alert relativo
    a un Gateway
  postconditions:
  - L'Attore visualizza il nome identificativo del Gateway
  main_scenario:
  - description: Viene visualizzato il nome del Gateway
- id: visualizzazione_stato_gateway_tenant
  title: Visualizzazione stato Gateway Tenant
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il Sistema presenta all’Attore la lista di Gateway associata al Tenant di appartenenza o i dettagli
    di uno di essi
  postconditions:
  - L'Attore visualizza lo stato del Gateway
  main_scenario:
  - description: Viene visualizzato lo stato del Gateway (sospeso, online, offline)
- id: visualizzazione_gateway_online
  title: Visualizzazione Gateway Online
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il Sistema presenta all’Attore la lista o il dettaglio di un Gateway
  - Il Gateway è attualmente connesso e operativo
  postconditions:
  - L'Attore visualizza l'indicatore di stato Online
  main_scenario:
  - description: Il Sistema mostra visivamente che il Gateway è in stato Online
  gen_parent: visualizzazione_stato_gateway_tenant
- id: visualizzazione_gateway_offline
  title: Visualizzazione Gateway Offline
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il Sistema presenta all’Attore la lista o il dettaglio di un Gateway
  - Il Gateway è attualmente disconnesso, spento o irraggiungibile dalla rete
  postconditions:
  - L'Attore visualizza l'indicatore di stato Offline
  main_scenario:
  - description: Il Sistema mostra visivamente che il Gateway è in stato Offline
  gen_parent: visualizzazione_stato_gateway_tenant
- id: visualizzazione_gateway_sospeso
  title: Visualizzazione Gateway Sospeso
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il Sistema presenta all’Attore la lista o il dettaglio di un Gateway
  - Il Gateway è stato precedentemente disabilitato o sospeso tramite il Sistema
  postconditions:
  - L'Attore visualizza l'indicatore di stato Sospeso
  main_scenario:
  - description: Il Sistema mostra visivamente che il Gateway è in stato Sospeso
  gen_parent: visualizzazione_stato_gateway_tenant
- id: visualizzazione_dettagli_gateway
  title: Visualizzazione dettagli Gateway
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il Sistema mostra la lista di Gateway
  postconditions:
  - L'Attore visualizza nome, stato, ultimo timestamp dati inviati ed i sensori del Gateway
  main_scenario:
  - description: L'attore seleziona un Gateway dalla lista
  - description: L'Attore visualizza l'identificativo del Gateway
    include: visualizzazione_nome_gateway_tenant
  - description: L'Attore visualizza lo stato del Gateway
    include: visualizzazione_stato_gateway_tenant
  - description: L'Attore visualizza l'ultimo timestamp dati inviati
    include: visualizzazione_timestamp_ultimo_invio_dati_gateway
  - description: L'Attore visualizza la lista dei sensori collegati
    include: visualizzazione_lista_sensori
  subcases:
  - id: visualizzazione_lista_sensori
    title: Visualizzazione lista sensori
    actors:
      primary:
      - tenant-usr
    preconditions:
    - Il Sistema mostra all'Attore i dettagli del Gateway selezionato o la sezione sensori del Tenant
    postconditions:
    - Il Sistema mostra l'elenco dei sensori associati
    main_scenario:
    - description: L’Attore richiede la visualizzazione dell’elenco dei sensori
      include: visualizzazione_singolo_sensore
    subcases:
    - id: visualizzazione_singolo_sensore
      title: Visualizzazione singolo sensore
      actors:
        primary:
        - tenant-usr
      preconditions:
      - Il Sistema mostra all’Attore la lista di sensori associati ad un Gateway
      postconditions:
      - L’Attore visualizza, nel singolo elemento della lista, ID sensore e timestamp ultimo invio dati
      main_scenario:
      - description: L’Attore visualizza l'identificativo del sensore
        include: visualizzazione_id_sensore
      - description: L’Attore visualizza il timestamp dell'ultima lettura
        include: visualizzazione_timestamp_ultimo_invio_dati_sensore
      subcases:
      - id: visualizzazione_timestamp_ultimo_invio_dati_sensore
        title: Visualizzazione timestamp ultimo invio dati sensore
        actors:
          primary:
          - tenant-usr
        preconditions:
        - Il Sistema mostra all'Attore la lista dei sensori collegati ad un Gateway
        postconditions:
        - L’Attore visualizza timestamp ultima lettura del sensore
        main_scenario:
        - description: L’Attore visualizza il timestamp associato all'ultimo dato ricevuto dal sensore
- id: visualizzazione_timestamp_ultimo_invio_dati_gateway
  title: Visualizzazione timestamp ultimo invio dati Gateway
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il Sistema mostra i dettagli di un Gateway o di un alert riguardante un Gateway non raggiungibile
  postconditions:
  - L'orario dell'ultimo pacchetto dati ricevuto è visibile
  main_scenario:
  - description: L'Attore visualizza l’orario dell’ultimo invio dati da parte del Gateway
- id: visualizzazione_id_sensore
  title: Visualizzazione ID sensore
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il Sistema mostra una lista di sensori o un alert riguardante un sensore
  postconditions:
  - L’Attore visualizza l’ID del sensore
  main_scenario:
  - description: L’Attore visualizza l’identificativo del sensore (UUID)
- id: visualizzazione_tipo_sensore
  title: Visualizzazione tipo sensore
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il Sistema mostra i dettagli di un sensore o un alert riguardante un sensore
  postconditions:
  - L’Attore visualizza la tipologia del sensore (es. temperatura, umidità, pressione)
  main_scenario:
  - description: L’Attore visualizza il tipo del sensore indicato dal Sistema
- id: visualizzazione_dati_stream
  title: Visualizzazione dati Stream
  actors:
    primary:
    - tenant-usr
    secondary:
    - p-gway
  preconditions:
  - Esiste almeno un sensore associato al Gateway di un Tenant gestito dall’Attore primario
  postconditions:
  - L’Attore ha visualizzato lo stream di suo interesse
  main_scenario:
  - description: L’Attore accede alla sezione “Visualizzazione dati Stream”
  - description: L’Attore visualizza i dati richiesti in formato tabellare
    include: visualizzazione_tabellare_dati_stream
  - description: L’Attore visualizza i dati richiesti in formato grafico
    include: visualizzazione_grafico_dati_stream
    extension_point: NessunDato
  extensions:
  - extension_point: NessunDato
    condition: Non ci sono dati da visualizzare
    uc: err_dati_non_disponibili
  subcases:
  - id: visualizzazione_tabellare_dati_stream
    title: Visualizzazione tabellare dati Stream
    actors:
      primary:
      - tenant-usr
    preconditions:
    - Esiste almeno un sensore associato al Gateway di un Tenant gestito dall’Attore primario
    - L’Attore sta visionando i dati sullo stream
    postconditions:
    - L’Attore visualizza i dati in tabella correttamente
    main_scenario:
    - description: 'L’Attore visualizza una tabella con: timestamp, Gateway, sensore, tipo misura, valore,
        unità'
      include: visualizzazione_singola_riga_dati_stream
    subcases:
    - id: visualizzazione_singola_riga_dati_stream
      title: Visualizzazione singola riga dati Stream
      actors:
        primary:
        - tenant-usr
      preconditions:
      - Esiste almeno un sensore associato al Gateway di un Tenant gestito dall’Attore primario
      - L’Attore sta visionando i dati sullo stream
      postconditions:
      - L’Attore visualizza, nella singola riga della tabella, timestamp, Gateway, sensore, tipo misura,
        valore e unità
      main_scenario:
      - description: L’Attore visualizza una riga della tabella con_:_ timestamp, Gateway, sensore, tipo
          misura, valore e unità
      - description: L’Attore visualizza i singoli dati della tabella
        include: visualizzazione_valore_dato_registrato
      - description: L’Attore visualizza il timestamp del dato 
        include: visualizzazione_timestamp_dato
      - description: L’Attore visualizza l'identificativo del sensore
        include: visualizzazione_id_sensore
  - id: visualizzazione_grafico_dati_stream
    title: Visualizzazione grafico dati Stream
    actors:
      primary:
      - tenant-usr
    preconditions:
    - Esiste almeno un sensore associato al Gateway di un Tenant gestito dall’Attore primario
    - L’Attore sta visionando i dati sullo stream
    postconditions:
    - L’Attore visualizza i dati in grafico correttamente
    main_scenario:
    - description: L’Attore visualizza uno o più grafici (in base alla tipologia dato) su base temporale
    - description: Il Sistema distingue le serie nel caso i dati includano più sensori (es. per sensore
        o tipo misura)
- id: visualizzazione_dati_fuori_range
  title: Visualizzazione dati fuori range
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Esiste almeno un sensore associato al Gateway di un Tenant gestito dall’Attore primario
  - Esiste almeno un dato registrato da un sensore che risulta fuori dal range accettato
  postconditions:
  - L’Attore visualizza i dati fuori range evidenziati
  main_scenario:
  - description: L’Attore visualizza i dati fuori range evidenziati nella singola riga dei dati stream
  gen_parent: visualizzazione_singola_riga_dati_stream
  subcases:
  - id: visualizzazione_valore_dato_registrato
    title: Visualizzazione valore dato registrato
    actors:
      primary:
      - tenant-usr
    preconditions:
    - Esiste almeno un sensore associato al Gateway di un Tenant gestito dall’Attore primario
    - Esiste almeno un dato registrato da un sensore che risulta fuori dal range accettato
    postconditions:
    - L’Attore visualizza il valore del dato registrato evidenziato come fuori range
    main_scenario:
    - description: L’Attore visualizza il valore del dato registrato evidenziato come fuori range
  - id: visualizzazione_timestamp_dato
    title: Visualizzazione timestamp dato
    actors:
      primary:
      - tenant-usr
    preconditions:
    - Esiste almeno un sensore associato al Gateway di un Tenant gestito dall’Attore primario
    - Esiste almeno un dato registrato da un sensore che risulta fuori dal range accettato
    postconditions:
    - L’Attore visualizza il timestamp di registrazione del dato
    main_scenario:
    - description: L’Attore visualizza il timestamp di registrazione del dato
- id: visualizzazione_range_accettato
  title: Visualizzazione range accettato
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Esiste almeno un sensore associato al Gateway di un Tenant gestito dall’Attore primario
  - Esiste almeno un dato registrato da un sensore che risulta fuori dal range accettato
  postconditions:
  - L’Attore visualizza il range accettato per il sensore in questione
  main_scenario:
  - description: L’Attore visualizza il range accettato per il sensore in questione
- id: filtraggio_dati
  title: Filtraggio dati
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il Sistema dispone di un insieme di dati da comunicare all'Attore
  postconditions:
  - Il Sistema filtra l'insieme di dati secondo richiesta
  main_scenario:
  - description: L'Attore definisce i parametri di filtraggio
  - description: L'attore ottiene l'insieme filtrato dei dati di partenza
- id: filtraggio_gateway
  title: Filtraggio dati per Gateway
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Esiste almeno un Gateway nel Tenant
  postconditions:
  - Il Sistema salva la richiesta di visualizzazione
  main_scenario:
  - description: L’Attore seleziona i Gateway dei quali visualizzare i dati
    include: filtraggio_singolo_gateway
  - description: Il Sistema salva le informazioni di visualizzazione
  gen_parent: filtraggio_dati
  subcases:
  - id: filtraggio_singolo_gateway
    title: Filtraggio dati per singolo Gateway
    actors:
      primary:
      - tenant-usr
    preconditions:
    - Esiste almeno un Gateway nel Tenant
    - Il Sistema mostra i Gateway di cui l'attore potrà visualizzare lo Stream di dati
    postconditions:
    - Viene aggiunto un Gateway alla lista della richiesta
    main_scenario:
    - description: L’Attore seleziona un Gateway da aggiungere alla lista di filtraggio
- id: filtraggio_sensore
  title: Filtraggio dati per sensore
  actors:
    primary:
    - tenant-usr
  preconditions:
  - L’Attore ha effettuato un filtraggio per Gateway
  - Esiste almeno un sensore associato al Gateway del Tenant gestito dall’Attore
  postconditions:
  - Il Sistema salva la richiesta di visualizzazione
  main_scenario:
  - description: L’Attore seleziona i sensori di cui visualizzare i dati
    include: filtraggio_singolo_sensore
  - description: Il Sistema salva le preferenze di visualizzazione
  gen_parent: filtraggio_dati
  subcases:
  - id: filtraggio_singolo_sensore
    title: Filtraggio dati per singolo sensore
    actors:
      primary:
      - tenant-usr
    preconditions:
    - L’Attore ha effettuato un filtraggio per Gateway
    - Esiste almeno un sensore associato al Gateway del Tenant gestito dall’Attore
    - Il Sistema mostra all'Attore l'elenco dei sensori di cui potrà visualizzare i dati
    postconditions:
    - Viene aggiunto un sensore alla lista della richiesta
    main_scenario:
    - description: L’Attore seleziona un sensore da aggiungere alla lista di filtraggio
- id: filtraggio_intervallo_temporale
  title: Filtraggio dati per intervallo temporale
  actors:
    primary:
    - tenant-usr
  preconditions:
  - Il Sistema mostra i dati relativi allo Stream del Tenant
  postconditions:
  - Il Sistema salva la richiesta di visualizzazione
  main_scenario:
  - description: L’Attore seleziona un intervallo di tempo per visualizzare i dati al suo interno
  - description: Il Sistema salva le preferenze di visualizzazione
  gen_parent: filtraggio_dati
- id: err_dati_non_disponibili
  title: Errore dati non disponibili
  actors:
    primary:
    - tenant-usr
  preconditions:
  - L’Attore si trova in una sezione di visualizzazione
  - Non sono stati registrati dati
  postconditions:
  - L’Attore è informato che non ci sono dati visualizzabili/esportabili
  main_scenario:
