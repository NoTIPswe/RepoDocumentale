  - Il Sistema mostra le impostazioni di impersonificazione relative al Tenant
  postconditions:
  - Le modifiche apportate dall’Attore vengono salvate
  main_scenario:
  - description: L’Attore abilita o disabilita la facoltà dell'Amministratore di Sistema di accedere come
      (“impersonare”) un Utente del tenant
  - description: Le modifiche vengono salvate
  - description: L’Attore viene notificato del buon esito dell’operazione
- id: aggiornamento_firmware_gateway
  title: Aggiornamento del firmware Gateway
  actors:
    primary:
    - tenant-adm
    secondary:
    - p-gway
  preconditions:
  - Il Sistema mostra all'Attore primario la lista dei Gateway
  - Esiste almeno un nuovo firmware valido nel Sistema che possa essere caricato
  postconditions:
  - L’Attore ha aggiornato con successo i dispositivi selezionati
  main_scenario:
  - description: L’Attore seleziona i Gateway sui quali vuole effettuare l’aggiornamento firmware
    include: selezione_gateway
  - description: L’Attore sceglie la versione del firmware tra quelle compatibili con tutti i Gateway
      selezionati
    include: selezione_firmware
  - description: L’Attore conferma l’avvio della procedura di aggiornamento
  - description: Il/I Gateway eseguono l'aggiornamento
  - description: L’Attore viene informato del buon esito della procedura al completamento
  subcases:
  - id: selezione_firmware
    title: Selezione firmware
    actors:
      primary:
      - tenant-adm
    preconditions:
    - Il Sistema mostra all'Attore primario la lista dei Gateway
    - Esiste almeno un nuovo firmware valido nel Sistema che possa essere caricato
    - L’Attore primario ha selezionato dei Gateway da aggiornare
    postconditions:
    - L’Attore ha selezionato con successo la versione firmware da installare
    main_scenario:
    - description: L’Attore visualizza la lista delle versioni del firmware tra quelle compatibili con
        tutti i Gateway selezionati
    - description: L’Attore seleziona una versione tra quelle visualizzate
- id: selezione_gateway
  title: Selezione Gateway
  actors:
    primary:
    - tenant-adm
    - sys-adm
  preconditions:
  - Il Sistema mostra all’Attore primario l’elenco dei Gateway del proprio Tenant
  postconditions:
  - I Gateway sono stati selezionati correttamente
  main_scenario:
  - description: L’Attore seleziona uno o più Gateway tramite il loro identificativo
- id: modifica_frequenza_invio_gateway
  title: Modifica frequenza invio dati Gateway specifico
  actors:
    primary:
    - tenant-adm
    secondary:
    - p-gway
  preconditions:
  - L’Attore ha precedentemente selezionato il Gateway su cui operare
  - Il Sistema mostra all’Attore primario l’attuale configurazione del Gateway
  postconditions:
  - La frequenza d’invio è stata correttamente aggiornata
  main_scenario:
  - description: L’Attore inserisce un nuovo valore valido (in millisecondi) per la frequenza di invio
      dati
    include: inserimento_valore_numerico
  - description: L’Attore salva la nuova configurazione
  - description: Il Gateway applica la nuova configurazione
  - description: L’Attore viene informato dell’avvenuta modifica
- id: autenticazione_client_api
  title: Autenticazione del client API
  actors:
    primary:
    - api-client
    secondary:
    - auth-server
  preconditions:
  - Il Client API è registrato e possiede credenziali valide
  postconditions:
  - L’Attore principale possiede un token valido per effettuare chiamate successive
  main_scenario:
  - description: L’Attore primario contatta l’endpoint del Sistema dedicato all’autenticazione allegando
      le credenziali utilizzando un protocollo sicuro e criptato
  - description: L’Auth Server riceve la richiesta inoltrata dal Sistema
    extension_point: ErroreAuthServer
  - description: L’Auth Server risponde al Sistema con un token valido
  - description: L’Attore primario riceve il token valido dal Sistema
  extensions:
  - extension_point: ErroreAuthServer
    condition: ClientID e/o ClientSecret forniti non sono validi
    uc: err_dati_autenticazione_invalidi
  - extension_point: ErroreAuthServer
    condition: L’Auth Server esterno non è raggiungibile
    uc: err_auth_server_non_disponibile
- id: err_dati_autenticazione_invalidi
  title: Errore dati di autenticazione non validi
  actors:
    primary:
    - api-client
    secondary:
    - auth-server
  preconditions:
  - Il Sistema ha ricevuto dall'Attore primario dei dati non validi per l’autenticazione
  postconditions:
  - L’autenticazione non va a buon fine e all’Attore primario viene notificato un errore di autenticazione
  main_scenario:
  - description: L’Auth Server risponde al Sistema con un errore di autenticazione
  - description: L’Attore primario riceve un errore di autenticazione dal Sistema
- id: err_auth_server_non_disponibile
  title: Errore Auth Server non disponibile
  actors:
    primary:
    - api-client
    secondary:
    - auth-server
  preconditions:
  - Il Sistema ha ricevuto la richiesta di autenticazione dall'Attore primario
  - L’Auth Server non è raggiungibile o risponde con un errore interno
  postconditions:
  - L’autenticazione non va a buon fine e all’Attore primario viene notificato un errore interno
  main_scenario:
  - description: L’Auth Server non è raggiungibile o risponde al Sistema con un errore interno
  - description: L’Attore primario riceve un messaggio di errore interno dal Sistema
- id: richiesta_dati_on_demand
  title: Richiesta dati On-Demand
  actors:
    primary:
    - api-client
  preconditions:
  - L’Attore primario dispone di un token di autenticazione
  postconditions:
  - L’Attore riceve i dati relativi alla richiesta effettuata
  main_scenario:
  - description: L’Attore invia una richiesta allegando un token di autenticazione, identificativi dei
      Gateway/sensori e intervallo temporale
    extension_point: DatiNonValidi
  - description: L’Attore riceve i dati storici richiesti
  extensions:
  - extension_point: DatiNonValidi
    condition: Il token fornito dall’Utente non è valido
    uc: err_token_api_invalido
  - extension_point: DatiNonValidi
    condition: ID Gateway invalido
    uc: err_id_gateway_invalido
  - extension_point: DatiNonValidi
    condition: ID sensore invalido
    uc: err_id_sensore_invalido
  - extension_point: DatiNonValidi
    condition: Intervallo temporale malformato
    uc: err_intervallo_temporale_invalido
- id: err_token_api_invalido
  title: Errore token autenticazione API invalido
  actors:
    primary:
    - api-client
  preconditions:
  - L’Attore primario dispone di un token di autenticazione
  - Il Sistema ha valutato il token di autenticazione è stato valutato invalido o scaduto
  postconditions:
  - L’Attore non può procedere con la richiesta
  - L’Attore deve ripetere l’autenticazione prima di effettuare una nuova richiesta
  main_scenario:
  - description: L’Attore riceve una risposta di errore di autenticazione
- id: err_id_gateway_invalido
  title: Errore ID Gateway invalido
  actors:
    primary:
    - api-client
  preconditions:
  - Il Sistema riceve un token di autenticazione valido
  - Il Sistema riceve dall’Attore uno o più ID Gateway non validi allegati ad una richiesta
  postconditions:
  - L’Attore non può procedere con la richiesta
  - L’Attore riceve una risposta di errore
  main_scenario:
  - description: L’Attore riceve una risposta di errore che segnala gli ID dei Gateway non validi
- id: err_id_sensore_invalido
  title: Errore ID Sensore invalido
  actors:
    primary:
    - api-client
  preconditions:
  - Il Sistema ha ricevuto un token di autenticazione valido dall'Attore primario
  - Il Sistema verifica che l’ID del sensore fornito non è valido/registrato
  postconditions:
  - L’Attore non può procedere con la richiesta
  - L’Attore riceve una risposta di errore
  main_scenario:
  - description: L’Attore riceve una risposta di errore che segnala gli ID dei sensori non validi per
      Gateway
- id: err_intervallo_temporale_invalido
  title: Errore intervallo Temporale Invalido
  actors:
    primary:
    - api-client
  preconditions:
  - Il Sistema riceve un token di autenticazione valido dall'Attore
  - L’intervallo temporale fornito nella richiesta non è valido
  postconditions:
  - L’Attore non può procedere con la richiesta
  - L’Attore riceve una risposta di errore
  main_scenario:
  - description: L’Attore riceve una risposta di errore che segnala l’intervallo temporale non valido
- id: richiesta_dati_streaming
  title: Richiesta dati Streaming
  actors:
    primary:
    - api-client
    secondary:
    - p-gway
  preconditions:
  - L’Attore dispone di un token di autenticazione
  postconditions:
  - L’Attore riceve i dati relativi alla richiesta effettuata
  main_scenario:
  - description: L’Attore invia una richiesta allegando un token di autenticazione e identificativi dei
      Gateway e dei relativi sensori
    extension_point: DatiNonValidi
  - description: L’Attore inizia a ricevere i dati real-time richiesti
  extensions:
  - extension_point: DatiNonValidi
    condition: Il token fornito dall’Utente non è valido
    uc: err_token_api_invalido
  - extension_point: DatiNonValidi
    condition: ID Gateway invalido
    uc: err_id_gateway_invalido
  - extension_point: DatiNonValidi
    condition: ID sensore invalido
    uc: err_id_sensore_invalido
