    primary:
    - non-authd-usr
  preconditions:
  - Esiste almeno un account registrato nel Sistema
  - L'Attore non è autenticato nel Sistema
  - Il Sistema è nello stato di autenticazione iniziale
  postconditions:
  - L'Attore ha inserito una mail
  main_scenario:
  - description: L'Attore inserisce la mail nel campo dedicato
