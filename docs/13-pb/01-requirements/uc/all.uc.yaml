- id: onboarding_gateway
  title: Provisioning Gateway - Onboarding
  actors:
    primary:
    - np-gway
  preconditions:
  - Il Gateway possiede le proprie credenziali di fabbrica
  - Il Gateway è stato registrato e associato ad un Tenant
  - Il Gateway è nello stato “not provisioned”
  postconditions:
  - Il Gateway viene provisionato correttamente
  - Il Gateway è in stato “active”
  - Il Gateway inizia a comunicare con il Sistema
  main_scenario:
  - description: Il Gateway contatta il Sistema attraverso un canale di comunicazione predefinito allegando
      le proprie credenziali di fabbrica
    extension_point: CredenzialiNonRiconosciute
  - description: Il Gateway riceve un pacchetto di provisioning contenente le informazioni necessarie
      alla comunicazione autenticata e sicura
  - description: Lo stato del Gateway passa da “not provisioned” a “active”
  extensions:
  - extension_point: CredenzialiNonRiconosciute
    condition: Le credenziali fornite non corrispondono a quelle registrate
    uc: err_auth_gateway_fabbrica
- id: err_auth_gateway_fabbrica
  title: Errore autenticazione Gateway di fabbrica
  actors:
    primary:
    - np-gway
  preconditions:
  - Il Sistema è stato contattato da un Gateway per la procedura di onboarding
  - Le credenziali di fabbrica fornite dal gateway sono invalide
  postconditions:
  - Il Gateway non procede con la procedura di onboarding
  main_scenario:
  - description: Il Gateway viene notificato dell'errore avvenuto
- id: invio_dati_crittografati_cloud
  title: Invio dati crittografati al Cloud
  actors:
    primary:
    - p-gway
  preconditions:
  - Esistono dati pronti per essere inviati al Cloud
  postconditions:
  - I dati sono stati inviati correttamente al Cloud in forma sicura
  main_scenario:
  - description: L’Attore stabilisce una connessione sicura verso l'endpoint del Cloud
    include: instaurazione_connessione_sicura
  - description: L’Attore invia i dati in maniera sicura al Cloud
  - description: L’Attore riceve la notifica dell’esito dell’operazione
  subcases:
  - id: instaurazione_connessione_sicura
    title: Instaurazione connessione sicura
    actors:
      primary:
      - np-gway
    preconditions:
    - L’Attore dispone delle credenziali crittografiche
    postconditions:
    - L’autenticazione ha esito positivo
    - È attivo un canale cifrato e autenticato tra Gateway e Cloud
    main_scenario:
    - description: L'Attore richiede l'apertura di una connessione sicura
    - description: L'Attore verifica la validità del certificato che gli viene fornito
    - description: L'Attore presenta il proprio certificato
      extension_point: CertificatoRifiutato
    - description: Il canale sicuro viene stabilito con successo
    extensions:
    - extension_point: CertificatoRifiutato
      condition: Il Cloud rifiuta il certificato del Gateway
      uc: err_autenticazione_gateway
- id: err_autenticazione_gateway
  title: Errore Autenticazione Gateway
  actors:
    primary:
    - p-gway
  preconditions:
  - Le credenziali fornite non sono valide
  postconditions:
  - Il canale sicuro non viene instaurato
  main_scenario:
  - description: L’Attore riceve un errore di autenticazione
  - description: Il canale sicuro non viene instaurato
- id: err_range_invalido
  title: Errore range invalido
  actors:
    primary:
