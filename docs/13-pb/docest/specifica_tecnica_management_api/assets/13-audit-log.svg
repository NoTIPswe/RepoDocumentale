4.9082,43.2969 L973,43.2969 A0,0 0 0 0 973,43.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1164.9082,43.2969 L1164.9082,53.2969 L1174.9082,53.2969 L1164.9082,43.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="98.2227" x="979" y="57.5791">@Controller('audit')</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="89.5996" x="979" y="69.2197">@TenantScoped()</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="123.9453" x="979" y="80.8604">@Roles(TENANT_ADMIN)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="77.7783" x="979" y="92.501">Endpoint: GET /</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="180.9082" x="979" y="104.1416">Required params: tenantId, from, to</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="117.0752" x="979" y="115.7822">Optional: userId, action</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="3.1787" x="979" y="127.4229">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="148.5742" x="979" y="139.0635">Obfuscation: If impersonating</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="165" x="979" y="150.7041">and action='UPDATE_GATEWAY',</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="134.7705" x="979" y="162.3447">obfuscates name in details</text></g><g class="entity" data-qualified-name="GMN35" data-source-line="153" id="ent0036"><path d="M1392.5,286.7969 L1392.5,366.6406 L1591.7715,366.6406 L1591.7715,296.7969 L1581.7715,286.7969 L1392.5,286.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1581.7715,286.7969 L1581.7715,296.7969 L1591.7715,296.7969 L1581.7715,286.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="161.5625" x="1398.5" y="301.0791">Service layer with dual purpose:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="168.501" x="1398.5" y="312.7197">1. Read audit logs (query builder)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="178.2715" x="1398.5" y="324.3604">2. Log audit events (programmatic)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="3.1787" x="1398.5" y="336.001">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="139.3652" x="1398.5" y="347.6416">Used by @Audit() decorator</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="99.8486" x="1398.5" y="359.2822">via AuditInterceptor</text></g><g class="entity" data-qualified-name="GMN38" data-source-line="162" id="ent0039"><path d="M1395,489.7969 L1395,569.6406 L1608.6807,569.6406 L1608.6807,499.7969 L1598.6807,489.7969 L1395,489.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1598.6807,489.7969 L1598.6807,499.7969 L1608.6807,499.7969 L1598.6807,489.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="89.0186" x="1401" y="504.0791">Data access layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="152.6025" x="1401" y="515.7197">- TypeORM query builder with:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="156.7041" x="1407.3574" y="527.3604">* Mandatory: tenantId, from, to</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="125.2539" x="1407.3574" y="539.001">* Optional: userId, action</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="187.8711" x="1401" y="550.6416">- Ordering: timestamp DESC, id DESC</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="192.6807" x="1401" y="562.2822">- Deterministic ordering for pagination</text></g><g class="entity" data-qualified-name="GMN41" data-source-line="171" id="ent0042"><path d="M348.5,60.7969 L348.5,152.2813 A0,0 0 0 0 348.5,152.2813 L463,152.2813 L467,228.8869 L471,152.2813 L585.8916,152.2813 A0,0 0 0 0 585.8916,152.2813 L585.8916,70.7969 L575.8916,60.7969 L348.5,60.7969 A0,0 0 0 0 348.5,60.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M575.8916,60.7969 L575.8916,70.7969 L585.8916,70.7969 L575.8916,60.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="102.1094" x="354.5" y="75.0791">JetStream consumer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="106.2109" x="354.5" y="86.7197">- Subject: log.audit.&gt;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="185.1074" x="354.5" y="98.3604">- Listens to provisioning audit events</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="213.6133" x="354.5" y="110.001">- Extracts tenant ID from subject or details</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="211.4307" x="354.5" y="121.6416">- Falls back to SYSTEM_USER_ID for userId</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="118.2568" x="354.5" y="133.2822">- Validates UUID format</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="216.3916" x="354.5" y="144.9229">- Does NOT ack on error (allows redelivery)</text></g><g class="entity" data-qualified-name="GMN44" data-source-line="181" id="ent0045"><path d="M1626.5,281.2969 L1626.5,372.7813 L1845.1807,372.7813 L1845.1807,291.2969 L1835.1807,281.2969 L1626.5,281.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1835.1807,281.2969 L1835.1807,291.2969 L1845.1807,291.2969 L1835.1807,281.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="102.2119" x="1632.5" y="295.5791">Static mapper utility</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="171.3477" x="1632.5" y="307.2197">- Entity -&gt; Model (direct mapping)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="128.4912" x="1632.5" y="318.8604">- Model -&gt; Response DTO</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="197.6807" x="1632.5" y="330.501">- Special handling for provisioning logs:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="175.2197" x="1638.8574" y="342.1416">* Detects via details.sourceSubject</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="124.3604" x="1638.8574" y="353.7822">* Replaces userId with '-'</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="174.1064" x="1632.5" y="365.4229">- Converts timestamp to ISO string</text></g><!--link AuditLogController to AuditLogService--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependen