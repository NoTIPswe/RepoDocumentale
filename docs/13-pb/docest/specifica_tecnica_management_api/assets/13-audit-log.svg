"M1063.9082,43.2969 L1063.9082,53.2969 L1073.9082,53.2969 L1063.9082,43.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="98.2227" x="878" y="57.5791">@Controller('audit')</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="89.5996" x="878" y="69.2197">@TenantScoped()</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="123.9453" x="878" y="80.8604">@Roles(TENANT_ADMIN)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="77.7783" x="878" y="92.501">Endpoint: GET /</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="180.9082" x="878" y="104.1416">Required params: tenantId, from, to</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="117.0752" x="878" y="115.7822">Optional: userId, action</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="3.1787" x="878" y="127.4229">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="148.5742" x="878" y="139.0635">Obfuscation: If impersonating</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="165" x="878" y="150.7041">and action='UPDATE_GATEWAY',</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="134.7705" x="878" y="162.3447">obfuscates name in details</text></g><g class="entity" data-qualified-name="GMN35" data-source-line="155" id="ent0036"><path d="M1266.5,272.7969 L1266.5,352.6406 L1465.7715,352.6406 L1465.7715,282.7969 L1455.7715,272.7969 L1266.5,272.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1455.7715,272.7969 L1455.7715,282.7969 L1465.7715,282.7969 L1455.7715,272.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="161.5625" x="1272.5" y="287.0791">Service layer with dual purpose:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="168.501" x="1272.5" y="298.7197">1. Read audit logs (query builder)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="178.2715" x="1272.5" y="310.3604">2. Log audit events (programmatic)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="3.1787" x="1272.5" y="322.001">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="139.3652" x="1272.5" y="333.6416">Used by @Audit() decorator</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="99.8486" x="1272.5" y="345.2822">via AuditInterceptor</text></g><g class="entity" data-qualified-name="GMN38" data-source-line="164" id="ent0039"><path d="M1266,425.7969 L1266,505.6406 L1479.6807,505.6406 L1479.6807,435.7969 L1469.6807,425.7969 L1266,425.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1469.6807,425.7969 L1469.6807,435.7969 L1479.6807,435.7969 L1469.6807,425.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="89.0186" x="1272" y="440.0791">Data access layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="152.6025" x="1272" y="451.7197">- TypeORM query builder with:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="156.7041" x="1278.3574" y="463.3604">* Mandatory: tenantId, from, to</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="125.2539" x="1278.3574" y="475.001">* Optional: userId, action</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="187.8711" x="1272" y="486.6416">- Ordering: timestamp DESC, id DESC</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="192.6807" x="1272" y="498.2822">- Deterministic ordering for pagination</text></g><g class="entity" data-qualified-name="GMN41" data-source-line="173" id="ent0042"><path d="M304.5,60.7969 L304.5,152.2813 A0,0 0 0 0 304.5,152.2813 L419,152.2813 L423,214.8769 L427,152.2813 L541.8916,152.2813 A0,0 0 0 0 541.8916,152.2813 L541.8916,70.7969 L531.8916,60.7969 L304.5,60.7969 A0,0 0 0 0 304.5,60.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M531.8916,60.7969 L531.8916,70.7969 L541.8916,70.7969 L531.8916,60.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="102.1094" x="310.5" y="75.0791">JetStream consumer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="106.2109" x="310.5" y="86.7197">- Subject: log.audit.&gt;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="185.1074" x="310.5" y="98.3604">- Listens to provisioning audit events</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="213.6133" x="310.5" y="110.001">- Extracts tenant ID from subject or details</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="211.4307" x="310.5" y="121.6416">- Falls back to SYSTEM_USER_ID for userId</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="118.2568" x="310.5" y="133.2822">- Validates UUID format</text><text fill="#000000" font-fami