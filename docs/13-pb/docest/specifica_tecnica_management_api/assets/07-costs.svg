" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="98.667" x="290.5" y="57.5791">@Controller('costs')</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="89.5996" x="290.5" y="69.2197">@TenantScoped()</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="123.9453" x="290.5" y="80.8604">@Roles(TENANT_ADMIN)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="77.7783" x="290.5" y="92.501">Endpoint: GET /</text></g><g class="entity" data-qualified-name="GMN29" data-source-line="82" id="ent0030"><path d="M1070.5,160.2969 L1070.5,275.0625 L1307.2227,275.0625 L1307.2227,170.2969 L1297.2227,160.2969 L1070.5,160.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1297.2227,160.2969 L1297.2227,170.2969 L1307.2227,170.2969 L1297.2227,160.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="99.0625" x="1076.5" y="174.5791">Business logic layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="176.8652" x="1076.5" y="186.2197">- Requests tenant cost aggregation</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="151.8408" x="1076.5" y="197.8604">- Validates cost data presence</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="151.04" x="1076.5" y="209.501">- Maps CostData to CostModel</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="215.7227" x="1076.5" y="221.1416">- Translates known upstream status codes:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="162.1387" x="1082.8574" y="232.7822">* 401 -&gt; UnauthorizedException</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="145.293" x="1082.8574" y="244.4229">* 403 -&gt; ForbiddenException</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="189.2188" x="1082.8574" y="256.0635">* 405 -&gt; MethodNotAllowedException</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="135.376" x="1076.5" y="267.7041">- Rethrows unknown errors</text></g><g class="entity" data-qualified-name="GMN32" data-source-line="94" id="ent0033"><path d="M1291.5,335.2969 L1291.5,484.9844 L1610.8691,484.9844 L1610.8691,345.2969 L1600.8691,335.2969 L1291.5,335.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1600.8691,335.2969 L1600.8691,345.2969 L1610.8691,345.2969 L1600.8691,335.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="116.04" x="1297.5" y="349.5791">Data aggregation layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="127.7002" x="1297.5" y="361.2197">1. Sends request to NATS</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="105.2637" x="1307.0361" y="372.8604">subject: internal.cost</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="177.7197" x="1307.0361" y="384.501">payload: { tenant_id: &lt;tenantId&gt; }</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="228.1738" x="1297.5" y="396.1416">2. Reads dataSizeAtRest from NATS response</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="207.3975" x="1297.5" y="407.7822">3. Falls back to 0 if response parsing fails</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="223.8135" x="1297.5" y="419.4229">4. Counts alerts via AlertsPersistenceService</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="273.0176" x="1297.5" y="431.0635">5. Counts commands via CommandPersistenceService</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="68.0029" x="1297.5" y="442.7041">6. Calculates:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="199.5703" x="1307.0361" y="454.3447">- storageGb = dataSizeAtRest / 1024^3</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="288.833" x="1307.0361" y="465.9854">- bandwidthGb = ((alerts + commands) * 1024) / 1024^3</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="212.2803" x="1297.5" y="477.626">7. Rounds both values to 4 decimal places</text></g><g class="entity" data-qualified-name="GMN35" data-source-line="109" id="ent0036"><path d="M1069.5,387.7969 L1069.5,432.7188 L1256.335,432.7188 L1256.335,397.7969 L1246.335,387.7969 L1069.5,387.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1246.335,387.7969 L1246.335,397.7969 L1256.335,397.7969 L1246.335,387.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="71.1816" x="1075.5" y="402.0791">Mapping layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="123.4961" x="1075.5" y="413.7197">- CostData -&gt; CostModel</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="165.835" x="1075.5" y="425.3604">- CostModel -&gt; CostResponseDto</text></g><!--link CostsController to CostsService--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="56" id="lnk13"><path codeLine="56" d="M435.75,251.3269 C435.75,286.4469 435.75,335.2869 435.75,370.5069" fill="none" id="CostsController-to-CostsService" style="stroke:#1976D2;stroke-width:1;"/><polygon fill="#1976D2" points="435.75,376.5069,439.75,367.5069,435.75,371.5069,431.75,367.5069,435.75,376.5069" style="stroke:#1976D2;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="22.9102" x="412.75" y="311.1991">uses</text></g><!--link CostsController to CostsMapper--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="dependency" data-source-line="57" id="lnk14"><path codeLine="57" d="M354.5,251.5569 C354.5,322.4769 354.5,480.2569 354.5,551.1169" fill="none" id="CostsController-to-CostsMapper" style="stroke:#1976D2;stroke-width:1;"/><polygon fill="#1976D2" points="354.5,557.1169,358.5,548.1169,354.5,552.1169,350.5,548.1169,354.5,557.1169" style="stroke:#1976D2;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="65.5029" x="288.5" y="401.6191">maps to DTO</text></g><!--link CostsController to CostResponseDto--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="dependency" data-source-line="58" id="lnk15"><path codeLine="58" d="M235.42,218.2969 C156.53,218.2969 68.33,218.2969 68.33,218.2969 C68.33,218.2969 68.33,576.4369 68.33,690.2369" fill="none" id="CostsController-to-CostResponseDto" style="stroke:#1976D2;stroke-width:1;"/><polygon fill="#1976D2" points="68.33,696.2369,72.33,687.2369,68.33,691.2369,64.33,687.2369,68.33,696.2369" style="stroke:#1976D2;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="36.1816" x="31.33" y="371.0091">returns</text></g><!--link CostsService to CostsPersistenceService--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency