.2188" x="665.8574" y="218.4229">* 405 -&gt; MethodNotAllowedException</text></g><g class="entity" data-qualified-name="GMN31" data-source-line="93" id="ent0032"><path d="M652.5,235.2969 L652.5,338.4219 L961.1367,338.4219 L961.1367,245.2969 L951.1367,235.2969 L652.5,235.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M951.1367,235.2969 L951.1367,245.2969 L961.1367,245.2969 L951.1367,235.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="116.04" x="658.5" y="249.5791">Data aggregation layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="194.8486" x="658.5" y="261.2197">1. Requests dataSizeAtRest from NATS</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="105.2637" x="668.0361" y="272.8604">subject: internal.cost</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="223.8135" x="658.5" y="284.501">2. Counts alerts via AlertsPersistenceService</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="273.0176" x="658.5" y="296.1416">3. Counts commands via CommandPersistenceService</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="68.0029" x="658.5" y="307.7822">4. Calculates:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="188.8379" x="668.0361" y="319.4229">- storageGb = dataSizeAtRest / 1024&#179;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="278.1006" x="668.0361" y="331.0635">- bandwidthGb = ((alerts + commands) * 1024) / 1024&#179;</text></g><!--link CostsController to CostsService--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-sou