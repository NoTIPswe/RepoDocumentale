gth="158.125" x="822.5" y="104.1416">- PUT /default (set type default)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="228.1836" x="822.5" y="115.7822">- PUT /sensor/:sensorId (set sensor threshold)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="133.9844" x="822.5" y="127.4229">- DELETE /sensor/:sensorId</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="138.4131" x="822.5" y="139.0635">- DELETE /type/:sensorType</text></g><g class="entity" data-qualified-name="GMN35" data-source-line="169" id="ent0036"><path d="M1547,215.2969 L1547,283.5 L1824.8652,283.5 L1824.8652,225.2969 L1814.8652,215.2969 L1547,215.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1814.8652,215.2969 L1814.8652,225.2969 L1824.8652,225.2969 L1814.8652,215.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="99.0625" x="1553" y="229.5791">Business logic layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="228.5303" x="1553" y="241.2197">- Validates sensorType (non-empty, trimmed)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="213.3008" x="1553" y="252.8604">- Validates sensorId (non-empty, trimmed)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="238.6572" x="1553" y="264.501">- Validates value range (minValue &lt; maxValue)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="256.8652" x="1553" y="276.1416">- Throws BadRequestException on validation errors</text></g><g class="entity" data-qualified-name="GMN38" data-source-line="177" id="ent0039"><path d="M1547.5,339.2969 L1547.5,442.4219 L1832.3965,442.42