th="129.7461" x="960.5" y="92.501">- GET / (list all thresholds)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="158.125" x="960.5" y="104.1416">- PUT /default (set type default)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="228.1836" x="960.5" y="115.7822">- PUT /sensor/:sensorId (set sensor threshold)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="133.9844" x="960.5" y="127.4229">- DELETE /sensor/:sensorId</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="138.4131" x="960.5" y="139.0635">- DELETE /type/:sensorType</text></g><g class="entity" data-qualified-name="GMN35" data-source-line="167" id="ent0036"><path d="M1748,229.2969 L1748,297.5 L2025.8652,297.5 L2025.8652,239.2969 L2015.8652,229.2969 L1748,229.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2015.8652,229.2969 L2015.8652,239.2969 L2025.8652,239.2969 L2015.8652,229.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="99.0625" x="1754" y="243.5791">Business logic layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="228.5303" x="1754" y="255.2197">- Validates sensorType (non-empty, trimmed)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="213.3008" x="1754" y="266.8604">- Validates sensorId (non-empty, trimmed)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="238.6572" x="1754" y="278.501">- Validates value range (minValue &lt; maxValue)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="256.8652" x="1754" y="290.1416">- Throws BadRequestException on validati