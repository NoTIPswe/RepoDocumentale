font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="28.812" x="2366.5" y="772.2974">RxJS</text><line style="stroke:#8BC34A;stroke-width:0.5;" x1="2340.5" x2="2397.312" y1="782.7969" y2="782.7969"/><line style="stroke:#8BC34A;stroke-width:0.5;" x1="2340.5" x2="2397.312" y1="790.7969" y2="790.7969"/></g><g class="entity" data-qualified-name="metrics.Module.Controller.Service.Interceptor.Types.GMN38" data-source-line="87" id="ent0039"><path d="M863.5,732.7969 L863.5,818.4609 L1118.0049,818.4609 L1118.0049,742.7969 L1108.0049,732.7969 L863.5,732.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1108.0049,732.7969 L1108.0049,742.7969 L1118.0049,742.7969 L1108.0049,732.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.0459" x="869.5" y="749.8638">@Controller() (root level)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.2759" x="869.5" y="764.9966">@Public() (bypasses auth)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.7476" x="869.5" y="780.1294">Endpoint: GET /metrics</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="233.5049" x="869.5" y="795.2622">Returns Prometheus metrics format</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.46" x="869.5" y="810.395">Sets Content-Type header</text></g><g class="entity" data-qualified-name="metrics.Module.Controller.Service.Interceptor.Types.GMN41" data-source-line="95" id="ent0042"><path d="M1697,702.7969 L1697,848.9922 L1946.5601,848.9922 L1946.5601,712.7969 L1936.5601,702.7969 L1697,702.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1936.5601,702.7969 L1936.5601,712.7969 L1946.5601,712.7969 L1936.5601,702.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.8403" x="1703" y="719.8638">Core metrics service</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="184.9136" x="1703" y="734.9966">- Owns Prometheus Registry</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="215.3125" x="1703" y="750.1294">- Collects default Node.js metrics</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.9624" x="1711.2646" y="765.2622">(prefix: notip_mgmt_)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.4038" x="1703" y="780.395">- Custom HTTP metrics:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.9492" x="1711.2646" y="795.5278">* Requests total (counter)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="203.0361" x="1711.2646" y="810.6606">* Request duration (histogram)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.376" x="1711.2646" y="825.7935">* In-flight requests (gauge)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228.5601" x="1703" y="840.9263">- Histogram buckets: 0.005s to 10s</text></g><g class="entity" data-qualified-name="metrics.Module.Controller.Service.Interceptor.Types.GMN44" data-source-line="107" id="ent0045"><path d="M2434,725.2969 L2434,826.0938 L2717.9517,826.0938 L2717.9517,735.2969 L2707.9517,725.2969 L2434,725.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2707.9517,725.2969 L2707.9517,735.2969 L2717.9517,735.2969 L2707.9517,725.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.0972" x="2440" y="742.3638">Global interceptor (APP_INTERCEPTER)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.0825" x="2440" y="757.4966">- Tracks all HTTP requests</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.7681" x="2440" y="772.6294">- Measures duration with hrtime</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.3418" x="2440" y="787.7622">- Labels: method, route, status_code</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262.9517" x="2440" y="802.895">- Increments/decrements in-flight gauge</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242.8677" x="2440" y="818.0278">- Falls back to '_unmatched' for route</text></g><g class="entity" data-qualified-name="metrics.Module.Controller.Service.Interceptor.Types.GMN47" data-source-line="116" id="ent0048"><path d="M1338,732.7969 L1338,771.7969 L1302.64,775.7969 L1338,779.7969 L1338,818.4609 A0,0 0 0 0 1338,818.4609 L1662.3481,818.4609 A0,0 0 0 0 1662.3481,818.4609 L1662.3481,742.7969 L1652.3481,732.7969 L1338,732.7969 A0,0 0 0 0 1338,732.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1652.3481,732.7969 L1652.3481,742.7969 L1662.3481,742.7969 L1652.3481,732.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131.7012" x="1344" y="749.8638">TypeScript interface</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.3364" x="1344" y="764.9966">Defines labels for HTTP metrics:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.0449" x="1344" y="780.1294">- method: HTTP method (GET, POST, etc.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.4844" x="1344" y="795.2622">- route: route path (or '_unmatched')</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.3481" x="1344" y="810.395">- status_code: response status (200, 404, etc.)</text></g><g class="entity" data-qualified-name="metrics.Module.Controller.Service.Interceptor.Types.GMN50" data-source-line="124" id="ent0051"><path d="M1982,642.2969 L1982,909.5547 L2303.9551,909.5547 L2303.9551,652.2969 L2293.9551,642.2969 L1982,642.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2293.9551,642.2969 L2293.9551,652.2969 L2303.9551,652.2969 L2293.9551,642.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.4668" x="1988" y="659.3638">Prometheus metric types:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1988" y="674.4966">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="159.4087" x="1988" y="689.6294">1. Counter (cumulative):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210.7168" x="2000.397" y="704.7622">notip_mgmt_http_requests_total</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1988" y="719.895">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.7124" x="1988" y="735.0278">2. Histogram (distribution):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="288.5581" x="2000.397" y="750.1606">notip_mgmt_http_request_duration_seconds</text><text fill="#000000" 