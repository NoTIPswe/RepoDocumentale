 textLength="99.7314" x="1064" y="57.5791">@Controller('users')</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="89.5996" x="1064" y="69.2197">@TenantScoped()</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="161.084" x="1064" y="80.8604">@Audit() on mutating endpoints</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="208.75" x="1064" y="92.501">All endpoints require TENANT_ADMIN role</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="53.0859" x="1064" y="104.1416">Endpoints:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="177.2314" x="1064" y="115.7822">- GET /:id, GET /, POST /, PATCH /:id</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="164.1992" x="1064" y="127.4229">- POST /bulk-delete (deprecated)</text></g><g class="entity" data-qualified-name="GMN44" data-source-line="218" id="ent0045"><path d="M1900,185.7969 L1900,288.9219 L2176.2002,288.9219 L2176.2002,195.7969 L2166.2002,185.7969 L1900,185.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2166.2002,185.7969 L2166.2002,195.7969 L2176.2002,195.7969 L2166.2002,185.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="99.0625" x="1906" y="200.0791">Business logic layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="75.2344" x="1906" y="211.7197">Business rules:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="237.2363" x="1906" y="223.3604">1. SYSTEM_ADMIN role forbidden in tenant APIs</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="255.2002" x="1906" y="235.001">2. Only SYSTEM_ADMIN can delete TENANT_ADMIN</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="130.332" x="1906" y="246.6416">3. Self-deletion prevented</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="229.0186" x="1906" y="258.2822">4. Cascading Keycloak deletion for last admin</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="230.6885" x="1906" y="269.9229">5. Transactional create with Keycloak rollback</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="221.2256" x="1906" y="281.5635">6. Username normalization (trim, capitalize)</text></g><g class="entity" data-qualified-name="GMN47" data-source-line="229" id="ent0048"><path d="M6,338.7969 L6,407 L287.7959,407 L287.7959,348.7969 L277.7959,338.7969 L6,338.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M277.7959,338.7969 L277.7959,348.7969 L287.7959,348.7969 L277.7959,338.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="89.0186" x="12" y="353.0791">Data access layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="165.127" x="12" y="364.7197">- TypeORM repository operations</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="260.7959" x="12" y="376.3604">- Bulk operations (getUsersByIds, deleteUsersByIds)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="203.2568" x="12" y="388.001">- Specialized queries (getTenantAdmins)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="165.2344" x="12" y="399.6416">- Last access timestamp updates</text></g><g class="entity" data-qualified-name="GMN50" data-source-line="237" id="ent0051"><path d="M1900,327.2969 L1900,418.7813 L2107.6895,418.7813 L2107.6895,337.2969 L2097.6895,327.2969 L1900,327.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2097.6895,327.2969 L2097.6895,337.2969 L2107.6895,337.2969 L2097.6895,327.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="124.6484" x="1906" y="341.5791">Keycloak IAM integration</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="172.0361" x="1906" y="353.2197">- Creates tenant users in Keycloak</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="121.9873" x="1906" y="364.8604">- Syncs application roles</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="109.6973" x="1906" y="376.501">- Updates user details</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="75.0537" x="1906" y="388.1416">- Deletes users</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="186.6895" x="1906" y="399.7822">- Manages tenant group assignments</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="157.4707" x="1906" y="411.4229">- OAuth2 client credentials flow</text></g><!--link UsersController to UsersService--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="183" id="lnk24"><path codeLine="183" d="M1287.75,294.3669 C1287.75,297.5469 1287.75,294.7669 1287.75,297.9869" fill="none" id="UsersController-to-UsersService" style="stroke:#1976D2;stroke-width:1;"/><polygon fill="#1976D2" points="1287.75,303.9869,1291.75,294.9869,1287.75,298.9869,1283.75,294.9869,1287.