.75,53.2969 L1347.75,53.2969 L1337.75,43.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="99.7314" x="1124" y="57.5791">@Controller('users')</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="89.5996" x="1124" y="69.2197">@TenantScoped()</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="161.084" x="1124" y="80.8604">@Audit() on mutating endpoints</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="208.75" x="1124" y="92.501">All endpoints require TENANT_ADMIN role</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="53.0859" x="1124" y="104.1416">Endpoints:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="177.2314" x="1124" y="115.7822">- GET /:id, GET /, POST /, PATCH /:id</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="164.1992" x="1124" y="127.4229">- POST /bulk-delete (deprecated)</text></g><g class="entity" data-qualified-name="GMN44" data-source-line="216" id="ent0045"><path d="M2125,199.7969 L2125,302.9219 L2401.2002,302.9219 L2401.2002,209.7969 L2391.2002,199.7969 L2125,199.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2391.2002,199.7969 L2391.2002,209.7969 L2401.2002,209.7969 L2391.2002,199.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="99.0625" x="2131" y="214.0791">Business logic layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="75.2344" x="2131" y="225.7197">Business rules:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="237.2363" x="2131" y="237.3604">1. SYSTEM_ADMIN role forbidden in tenant APIs</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="255.2002" x="2131" y="249.001">2. Only SYSTEM_ADMIN can delete TENANT_ADMIN</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="130.332" x="2131" y="260.6416">3. Self-deletion prevented</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="229.0186" x="2131" y="272.2822">4. Cascading Keycloak deletion for last admin</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="230.6885" x="2131" y="283.9229">5. Transactional create with Keycloak rollback</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="221.2256" x="2131" y="295.5635">6. Username normalization (trim, capitalize)</text></g><g class="entity" data-qualified-name="GMN47" data-source-line="227" id="ent0048"><path d="M6,402.7969 L6,471 L287.7959,471 L287.7959,412.7969 L277.7959,402.7969 L6,402.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M277.7959,402.7969 L277.7959,412.7969 L287.7959,412.7969 L277.7959,402.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="89.0186" x="12" y="417.0791">Data access layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="165.127" x="12" y="428.7197">- TypeORM repository operations</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="260.7959" x="12" y="440.3604">- Bulk operations (getUsersByIds, deleteUsersByIds)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="203.2568" x="12" y="452.001">- Specialized queries (getTenantAdmins)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="165.2344" x="12" y="463.6416">- Last access timestamp updates</text></g><g class="entity" data-qualified-name="GMN50" data-source-line="235" id="ent0051"><path d="M2125,391.2969 L2125,482.7813 L2332.6895,482.7813 L2332.6895,401.2969 L2322.6895,391.2969 L2125,391.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2322.6895,391.2969 L2322.6895,401.2969 L2332.6895,401.2969 L2322.6895,391.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="124.6484" x="2131" y="405.5791">Keycloak IAM integration</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="172.0361" x="2131" y="417.2197">- Creates tenant users in Keycloak</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="121.9873" x="2131" y="428.8604">- Syncs application roles</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="109.6973" x="2131" y="440.501">- Updates user details</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="75.0537" x="2131" y="452.1416">- Deletes users</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="186.6895" x="2131" y="463.7822">- Manages tenant group assignments</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="157.4707" x="2131" y="475.4229">- OAuth2 client credentials flow</text></g><!--link UsersController to UsersService--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="181" id="lnk24"><path codeLine="181" d="M1368.75,308.4669 C1368.75,327.3069 1368.75,342.4569 1368.75,362.0769" fill="n