gthAdjust="spacing" textLength="33.5107" x="885" y="127.4229">- GET /</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="39.6924" x="885" y="139.0635">- POST /</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="59.3115" x="885" y="150.7041">- PATCH /:id</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="96.0596" x="885" y="162.3447">- POST /bulk-delete</text></g><g class="entity" data-qualified-name="GMN66" data-source-line="261" id="ent0067"><path d="M2088.5,234.7969 L2088.5,337.9219 L2435.3838,337.9219 L2435.3838,244.7969 L2425.3838,234.7969 L2088.5,234.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2425.3838,234.7969 L2425.3838,244.7969 L2435.3838,244.7969 L2425.3838,234.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="99.0625" x="2094.5" y="249.0791">Business logic layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="75.2344" x="2094.5" y="260.7197">Business rules:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="237.2363" x="2094.5" y="272.3604">1. SYSTEM_ADMIN role forbidden in tenant APIs</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="255.2002" x="2094.5" y="284.001">2. Only SYSTEM_ADMIN can delete TENANT_ADMIN</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="130.332" x="2094.5" y="295.6416">3. Self-deletion prevented</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="229.0186" x="2094.5" y="307.2822">4. Cascading Keycloak deletion for last admin</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="228.5645" x="2094.5" y="318.9229">5. Keycloak rollback if DB save fails on create</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="325.8838" x="2094.5" y="330.5635">6. Username normalization (trim, lowercase, capitalize first char)</text></g><g class="entity" data-qualified-name="GMN69" data-source-line="272" id="ent0070"><path d="M2089,461.2969 L2089,529.5 L2370.7959,529.5 L2370.7959,471.2969 L2360.7959,461.2969 L2089,461.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2360.7959,461.2969 L2360.7959,471.2969 L2370.7959,471.2969 L2360.7959,461.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="89.0186" x="2095" y="475.5791">Data access layer</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="165.127" x="2095" y="487.2197">- TypeORM repository operations</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="260.7959" x="2095" y="498.8604">- Bulk operations (getUsersByIds, deleteUsersByIds)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="203.2568" x="2095" y="510.501">- Specialized queries (getTenantAdmins)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="165.2344" x="2095" y="522.1416">- Last access timestamp updates</text></g><g class="entity" data-qualified-name="GMN72" data-source-line="280" id="ent0073"><path d="M2406,449.7969 L2406,541.2813 L2613.6895,541.2813 L2613.6895,459.7969 L2603.6895,449.7969 L2406,449.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2603.6895,449.7969 L2603.6895,459.7969 L2613.6895,459.7969 L2603.6895,449.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sa