">Cap at 120 points per dataset.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="173.5596" x="31.39" y="1040.4883">Italian locale timestamp formatting.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="189.3213" x="31.39" y="1052.2656">Responsive update via Angular effect().</text></g><g class="entity" data-qualified-name="GMN33" data-source-line="139" id="ent0034"><path d="M355.14,43.4883 L355.14,112.375 L557.2777,112.375 L557.2777,53.4883 L547.2777,43.4883 L355.14,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M547.2777,43.4883 L547.2777,53.4883 L557.2777,53.4883 L547.2777,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="180.8789" x="361.14" y="58.1563">Facade that wraps DecryptedMeasure</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="176.6016" x="361.14" y="69.9336">and adds isOutOfBounds evaluation.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="173.5645" x="361.14" y="81.7109">Transforms DecryptedEnvelope into</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="181.1377" x="361.14" y="93.4883">CheckedEnvelope by evaluating value</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="129.8828" x="361.14" y="105.2656">against cached thresholds.</text></g><!--link DashboardPage to FilterPanel--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="97" id="lnk11"><path codeLine="97" d="M238.54,673.6583 C257.05,673.6583 270.64,673.6583 290.17,673.6583" fill="none" id="DashboardPage-to-FilterPanel" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="