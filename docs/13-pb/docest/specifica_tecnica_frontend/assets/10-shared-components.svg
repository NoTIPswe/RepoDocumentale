8.8163">Generic modal overlay with backdrop.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="168.2715" x="1405.77" y="270.5936">Uses HTML &lt;dialog&gt; element with</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="172.8418" x="1405.77" y="282.3709">&lt;ng-content&gt; projection. Supports</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="147.6074" x="1405.77" y="294.1483">closing on backdrop click with</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="130.2051" x="1405.77" y="305.9256">target detection to prevent</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="85.1318" x="1405.77" y="317.703">accidental closes.</text></g><g class="entity" data-qualified-name="GMN32" data-source-line="159" id="ent0033"><path d="M1611.74,250.0383 L1611.74,318.925 L1814.2634,318.925 L1814.2634,260.0383 L1804.2634,250.0383 L1611.74,250.0383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1804.2634,250.0383 L1804.2634,260.0383 L1814.2634,260.0383 L1804.2634,250.0383" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="181.5234" x="1617.74" y="264.7063">Reusable multi-select dropdown with</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="173.8232" x="1617.74" y="276.4836">integrated search. Opens/closes via</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="153.999" x="1617.74" y="288.2609">document click and Escape key.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="159.2041" x="1617.74" y="300.0383">Options filtered by search query.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="149.9805" x="1617.74" y="311.8156">Used extensively in FilterPanel.</text></g><g class="entity" data-qualified-name="GMN35" data-source-line="167" id="ent0036"><path d="M1400.38,457.2583 L1400.38,537.9223 L1615.628,537.9223 L1615.628,467.2583 L1605.628,457.2583 L1400.38,457.2583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1605.628,457.2583 L1605.628,467.2583 L1615.628,467.2583 L1605.628,457.2583" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="175" x="1406.38" y="471.9263">Colored badge component mapping</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="140.5566" x="1406.38" y="483.7036">status strings to CSS classes:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="155.4688" x="1406.38" y="495.4809">- is-good (green): online, active</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="194.248" x="1406.38" y="507.2583">- is-warn (yellow): paused, provisioning</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="193.1201" x="1406.38" y="519.0356">- is-bad (red): offline, suspended, error</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="138.54" x="1406.38" y="530.813">- is-neutral (gray): unknown</text></g><!--link Sidebar to ImpBanner--><g class="link" data-entity-1="ent0003" data-entity-2="ent0008" data-link-type="dependency" data-source-line="128" id="lnk13"><path codeLine="128" d="M648.77,375.4783 C648.77,402.5183 648.77,424.9183 648.77,447.5183" fill="none" id="Sidebar-to-ImpBanner" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="648.77,453.5183,652.77,444.5183,648.77,448.5183,644.77,4