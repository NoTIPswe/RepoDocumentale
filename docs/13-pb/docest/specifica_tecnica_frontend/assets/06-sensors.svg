ont-size="10" lengthAdjust="spacing" textLength="94.1016" x="660.34" y="822.9376">RomeDateTimePipe</text><line style="stroke:#181818;stroke-width:0.5;" x1="636.34" x2="756.4416" y1="833.1583" y2="833.1583"/><line style="stroke:#181818;stroke-width:0.5;" x1="636.34" x2="756.4416" y1="841.1583" y2="841.1583"/></g><g class="entity" data-qualified-name="GMN25" data-source-line="100" id="ent0026"><path d="M92.04,714.7083 L92.04,783.595 L357.6738,783.595 L357.6738,724.7083 L347.6738,714.7083 L92.04,714.7083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M347.6738,714.7083 L347.6738,724.7083 L357.6738,724.7083 L347.6738,714.7083" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="206.709" x="98.04" y="729.3762">Displays all sensors for the current tenant.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="205.1904" x="98.04" y="741.1536">Uses frontend-computed signals to derive</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="241.4697" x="98.04" y="752.9309">unique 'gatewayOptions' and 'sensorTypeOptions'</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="202.7539" x="98.04" y="764.7083">for the MultiSelectDropdowns and applies</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="163.9063" x="98.04" y="776.4856">local filtering via 'filteredSensors'.</text></g><g class="entity" data-qualified-name="GMN28" data-source-line="108" id="ent0029"><path d="M552.3,1140.7083 L552.3,1209.595 L840.4777,1209.595 L840.4777,1150.7083 L830.4777,1140.7083 L552.3,1140.7083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M830.4777,1140.7083 L830.4777,1150.7083 L840.4777,1150.7083 L830.4777,1140.7083" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="246.1084" x="558.3" y="1155.3762">Displays sensor metadata and real-time telemetry.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="219.3311" x="558.3" y="1167.1536">Depending on AuthService.isImpersonating(),</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="216.1182" x="558.3" y="1178.9309">fetches history (query) and starts SSE stream</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="223.3789" x="558.3" y="1190.7083">via Obfuscated or Validated measure services.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="267.1777" x="558.3" y="1202.4856">Safeguards overlapping requests with 'telemetryRunId'.</text></g><g class="entity" data-qualified-name="GMN31" data-source-line="116" id="ent0032"><path d="M581.14,43.4883 L581.14,88.8203 A0,0 0 0 0 581.14,88.8203 L692.08,88.8203 L696.08,193.5283 L700.08,88.8203 L811.6517,88.8203 A0,0 0 0 0 811.6517,88.8203 L811.6517,53.4883 L801.6517,43.4883 L581.14,43.4883 A0,0 0 0 0 581.14,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M801.6517,43.4883 L801.6517,53.4883 L811.6517,53.4883 L801.6517,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="161.5527" x="587.14" y="58.1563">Communicates with the Data API.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="209.5117" x="587.14" y="69.9336">Supports automatic data polling using RxJS</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="167.4805" x="587.14" y="81.7109">Default refresh rate is 10 seconds.</text></g><!--link SensorListPage to SensorSe