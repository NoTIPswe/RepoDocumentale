ss="entity" data-qualified-name="GMN40" data-source-line="139" id="ent0041"><path d="M6,119.0483 L6,199.7123 L226.9023,199.7123 L226.9023,129.0483 L216.9023,119.0483 L6,119.0483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M216.9023,119.0483 L216.9023,129.0483 L226.9023,129.0483 L216.9023,119.0483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="162.0996" x="12" y="133.7162">Maintains internal signals for list,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="176.2402" x="12" y="145.4936">selected gateway, and loading state.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="186.9678" x="12" y="157.2709">Exposes them as read-only Signal&lt;T&gt;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="174.7754" x="12" y="169.0483">via .asReadonly(). Normalizes status</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="199.9023" x="12" y="180.8256">from API (handles uppercase, camelCase,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="119.1113" x="12" y="192.603">paused/offline variants).</text></g><g class="entity" data-qualified-name="GMN43" data-source-line="148" id="ent0044"><path d="M2025.66,334.8183 L2025.66,415.4823 L2251.2498,415.4823 L2251.2498,344.8183 L2241.2498,334.8183 L2025.66,334.8183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2241.2498,334.8183 L2241.2498,344.8183 L2251.2498,344.8183 L2241.2498,334.8183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="166.3428" x="2031.66" y="349.4863">Sends config/firmware commands</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="147.8613" x="2031.66" y="361.2636">then polls status every 2s with</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="187.7588" x="2031.66" y="373.0409">5-minute timeout. Maps 304 to cache,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="152.2461" x="2031.66" y="384.8183">404/503 to timeout. Filters out</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="132.085" x="2031.66" y="396.5956">invalid fields from payload.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="204.5898" x="2031.66" y="408.373">Rejects commands with disallowed status.</text></g><g class="entity" data-qualified-name="GMN46" data-source-line="157" id="ent0047"><path d="M1807,328.9283 L1807,421.3697 L2017.8926,421.3697 L2017.8926,338.9283 L2007.8926,328.9283 L1807,328.9283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2007.8926,328.9283 L2007.8926,338.9283 L2017.8926,338.9283 L2007.8926,328.9283" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="185.8203" x="1813" y="343.5963">Most complex page in the application.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="188.0762" x="1813" y="355.3736">Combines: gateway summary, rename,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="189.8926" x="1813" y="367.1509">command sending (config + firmware),</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="154.2529" x="1813" y="378.9283">delete confirmation, sensor list,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="168.3984" x="1813" y="390.7056">and live telemetry stream. Handles</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="183.8721" x="1813" y="402.483">impersonation checks and role-based</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="61.8799" x="1813" y="414.2603">permissions.</text></g><!--link GatewayListPage to GatewayCard--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="115" id="lnk13"><path codeLine="115" d="M746.35,159.3683 C822.9,159.3683 924.18,159.3683 924.18,159.3683 C924.18,159.3683 924.18,386.5183 924.18,485.7983" fill="none" id="GatewayListPage-to-GatewayCard" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="924.18,491.7983,928.18,482.7983,924.18,486.7983,920.18,482.7983,924.18,491.7983" style="stroke:#181818;stroke-width:1;"/></g><!--link GatewayListPage to GatewaySvc--><g class="link" data-entity-1="ent0003" data-entity-2="ent0011" data-link-type="dependency" data-source-line="116" id="lnk14"><path codeLine="116" d="M662.45,209.2183 C662.45,248.3883 662.45,296.3683 662.45,296.3683 C662.45,296.3683 589.18,296.3683 517.19,296.3683" fill="none" id="GatewayListPage-to-GatewaySvc" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="511.19,296.3683,520.19,300.3683,516.19,296.3683,520.19,292.3683,511.19,296.3683" style="stroke:#181818;stroke-width:1;"/></g><!--link GatewayDetailPage to GatewaySvc--><g class="link" data-entity-1="ent0004" data-entity-2="ent0011" data-link-type="dependency" data-source-line="117" id="lnk15"><path codeLine="117" d="M1186.67,244.6183 C1186.67,275.2383 1186.67,302.3683 1186.67,302.3683 C1186.67,302.3683 736.52,302.3683 517.36,302.3683" fill="none" id="GatewayDetailPage-to-GatewaySvc" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="511.36,302.3683,520.36,306.3683,516.36,302.3683,520.36,298.3683,511.36