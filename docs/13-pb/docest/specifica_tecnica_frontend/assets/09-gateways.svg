6,205.5923 L226.9023,205.5923 L226.9023,134.9283 L216.9023,124.9283 L6,124.9283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M216.9023,124.9283 L216.9023,134.9283 L226.9023,134.9283 L216.9023,124.9283" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="162.0996" x="12" y="139.5963">Maintains internal signals for list,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="176.2402" x="12" y="151.3736">selected gateway, and loading state.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="186.9678" x="12" y="163.1509">Exposes them as read-only Signal&lt;T&gt;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="177.2217" x="12" y="174.9283">via public getters. Normalizes status</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="199.9023" x="12" y="186.7056">from API (handles uppercase, camelCase,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="119.1113" x="12" y="198.483">paused/offline variants).</text></g><g class="entity" data-qualified-name="GMN42" data-source-line="170" id="ent0043"><path d="M3338.66,364.2583 L3338.66,444.9223 L3564.2498,444.9223 L3564.2498,374.2583 L3554.2498,364.2583 L3338.66,364.2583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M3554.2498,364.2583 L3554.2498,374.2583 L3564.2498,374.2583 L3554.2498,364.2583" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="166.3428" x="3344.66" y="378.9263">Sends config/firmware commands</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="147.8613" x="3344.66" y="390.7036">then polls status every 2s with</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="187.7588" x="3344.66" y="402.4809">5-minute timeout. Maps 304 to cache,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="152.2461" x="3344.66" y="414.2583">404/503 to timeout. Filters out</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="132.085" x="3344.66" y="426.0356">invalid fields from payload.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="204.5898" x="3344.66" y="437.813">Rejects commands with disallowed status.</text></g><g class="entity" data-qualified-name="GMN45" data-source-line="179" id="ent0046"><path d="M2336,358.3683 L2336,450.8097 L2546.8926,450.8097 L2546.8926,368.3683 L2536.8926,358.3683 L2336,358.3683" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2536.8926,358.3683 L2536.8926,368.3683 L2546.8926,368.3683 L2536.8926,358.3683" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="185.8203" x="2342" y="373.0363">Most complex page in the application.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="188.0762" x="2342" y="384.8136">Combines: gateway summary, rename,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="189.8926" x="2342" y="396.5909">command sending (config + firmware),</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="154.2529" x="2342" y="408.3683">delete confirmation, sensor list,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="126.3037" x="2342" y="420.1456">and live telemetry stream.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="169.6973" x="2342" y="431.923">Relies on external core services for</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="179.5117" x="2342" y="443.7003">impersonation checks and telemetry.</text></g><!--link GatewayListPage to GatewayCard--><g class="link" data-entity-1="ent0013" data-entity-2="ent0015" data-link-type="dependency" data-source-line="138" id="lnk22"><path codeLine="138" d="M431.83,232.8883 C431.83,271.5883 431.83,313.3083 431.83,348.6183" fill="none" id="GatewayListPage-to-GatewayCard" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="431.83,354.6183,435.83,345.6183,431.83,349.6183,427.83,345.6183,431.83,354.6183" style="stroke:#181818;stroke-width:1;"/></g><!--link GatewayListPage to GatewaySvc--><g class="link" data-entity-1="ent0013" data-entity-2="ent0020" data-link-type="dependency" data-source-line="139" id="lnk23"><path codeLine="139" d="M564.73,232.8883 C564.73,254.3083 564.73,272.4983 564.73,295.8183" fill="none" id="GatewayListPage-to-GatewaySvc" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="564.73,301.8183,568.73,292.8183,564.73,296.8183,560.73,292.8183,564.73,301.8183" style="stroke:#181818;stroke-width:1;"/></g><!--link GatewayDetailPage to GatewaySvc--><g class="link" data-entity-1="ent0014" data-entity-2="ent0020" data-link-type="dependency" data-source-line="140" id="lnk24"><path codeLine="140" d="M1977.7,256.4783 C1977.7,288.5783 1977.7,316.8083 1977.7,316.8083 C1977.7,316.8083 1310.21,316.8083 942.87,316.8083" fill="none" id="GatewayDetailPage-to-GatewaySvc" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="936.87,316.8083,945.87,320.8083,941.87,316.8083,945.87,312.8083,936.87,316.8083" style="stroke:#181818;stroke-width:1;"/></g><!--link GatewayDetailPage to CommandSvc--><g class="link" data-entity-1="ent0014" data-entity-2="ent0021" data-link-type="dep