605.2431,558.1059 606.0341,558.1059 Q606.4052,558.1059 606.7544,557.9472 Q607.1035,557.7886 607.4746,557.4468 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="83.5645" x="623.6963" y="559.0376">CommandService</text><line style="stroke:#181818;stroke-width:0.5;" x1="406.04" x2="897.417" y1="569.2583" y2="569.2583"/><line style="stroke:#181818;stroke-width:1;" x1="406.04" x2="897.417" y1="577.2583" y2="577.2583"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="228.3887" x="411.04" y="590.9263">-commandsApi: CommandsService (generated)</text><line style="stroke:#181818;stroke-width:1;" x1="406.04" x2="897.417" y1="597.0356" y2="597.0356"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="419.2822" x="411.04" y="610.7036">+sendConfig(id: string, config: GatewayConfig): Observable&lt;CommandStatusUpdate&gt;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="456.8945" x="411.04" y="622.4809">+sendFirmware(id: string, firmware: GatewayFirmware): Observable&lt;CommandStatusUpdate&gt;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="481.377" x="411.04" y="634.2583">+pollStatus(gwId: string, cmdId: string, intervalMs: number): Observable&lt;CommandStatusUpdate&gt;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="251.3916" x="411.04" y="646.0356">-toCommandStatus(status: string): CommandStatus</text></g><g class="entity" data-qualified-name="GMN39" data-source-line="164" id="ent0040"><path d="M541.27,1445.3783 L541.27,1526.0423 L762.1723,1526.0423 L762.1723,1455.3783 L752.1723,1445.3783 L541.27,1445.3783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M752.1723,1445.3783 L752.1723,1455.3783 L762.1723,1455.3783 L752.1723,1445.3783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="162.0996" x="547.27" y="1460.0462">Maintains internal signals for list,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="176.2402" x="547.27" y="1471.8236">selected gateway, and loading state.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="186.9678" x="547.27" y="1483.6009">Exposes them as read-only Signal&lt;T&gt;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="177.2217" x="547.27" y="1495.3783">via public getters. Normalizes status</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="199.9023" x="547.27" y="1507.1556">from API (handles uppercase, camelCase,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="119.1113" x="547.27" y="1518.933">paused/offline variants).</text></g><g class="entity" data-qualified-name="GMN42" data-source-line="173" id="ent0043"><path d="M957.68,556.3783 L957.68,592.7083 L898.64,596.7083 L957.68,600.7083 L957.68,637.0423 A0,0 0 0 0 957.68,637.0423 L1183.2698,637.0423 A0,0 0 0 0 1183.2698,637.0423 L1183.2698,566.3783 L1173.2698,556.3783 L957.68,556.3783 A0,0 0 0 0 957.68,556.3783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1173.2698,556.3783 L1173.2698,566.3783 L1183.2698,566.3783 L1173.2698,556.3783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="166.3428" x="963.68" y="571.0463">Sends config/firmware commands</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="147.8613" x="963.68" y="582.8236">then polls status every 2s with</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="187.7588" x="963.68" y="594.6009">5-minute timeout. Maps 304 to cache,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="152.2461" x="963.68" y="606.3783">404/503 to timeout. Filters out</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="132.085" x="963.68" y="618.1556">invalid fields from payload.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="204.5898" x="963.68" y="629.933">Rejects commands with disallowed status.</text></g><g class="entity" data-qualified-name="GMN45" data-source-line="182" id="ent0046"><path d="M92.57,43.4883 L92.57,135.9297 L303.4626,135.9297 L303.4626,53.4883 L293.4626,43.4883 L92.57,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M293.4626,43.4883 L293.4626,53.4883 L303.4626,53.4883 L293.4626,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="185.8203" x="98.57" y="58.1563">Most complex page in the application.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="188.0762" x="98.57" y="69.9336">Combines: gateway summary, rename,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="189.8926" x="98.57" y="81.7109">command sending (config + firmware),</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="154.2529" x="98.57" y="93.4883">delete confirmation, sensor list,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="126.3037" x="98.57" y="105.2656">and live telemetry stream.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="169.6973" x="98.57" y="117.043">Relies on external core services for</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="179.5117" x="98.57" y="128.8203">impersonation checks and telemetry.</text></g><!--link GatewayListPage to GatewayCard--><g class="link" data-entity-1="ent0013" data-entity-2="ent0015" data-link-type="dependency" data-source-line="141" id="lnk22"><path codeLine="141" d="M313.09,276.8683 C391.07,276.8683 486.52,276.8683 557.98,276.8683" fill="none" id="GatewayListPage-to-GatewayCard" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="563.98,276.8683,554.98,272.8683,558.98,276.8683,554.98,280.8683,563.98,276.8683" style="stroke:#181818;stroke-width:1;"/></g><!--link GatewayListPage to GatewaySvc--><g class="link" data-entity-1="ent0013" data-entity-2="ent0020" data-link-type="dependency" data-source-line="142" id="lnk23"><path codeLine="142" d="M313.09,367.5383 C346.3,367.5383 377.78,367.5383 415.37,367.5383" fill="none" id="GatewayListPage-to-GatewaySvc" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="421.37,367.5383,412.37,363.5383,416.37,367.5383,412.37,371.5383,421.37,367.5383" style="stroke:#181818;stroke-width:1;"/></g><!--link GatewayDetailPage to GatewaySvc--><g class="link" data-entity-1="ent0014" data-entity-2="ent0020" data-link-type="dependency" data-source-line="143" id="lnk24"><path codeLine="143" d="M358.03,855.7183 C358.03,712.1083 358.03,449.0383 358.03,449.0383 C358.03,449.0383 378.26,449.0383 415.04,449.0383" fill="none" id="GatewayDetailPage-to-GatewaySvc" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="421.04,449.0383,412.04,445.0383,416.04,449.0383,412.04,453.0383,421.04,449.0383" style="stroke:#181818;stroke-width:1;"/></g><!--link GatewayDetailPage to CommandSvc--><g class="link" data-entity-1="ent0014" data-entity-2="ent0021" data-link-type="dependency" data-source-line="144" id="lnk25"><path codeLine="144" d="M373.25,879.2383 C408.01,