height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="527.25" y="419.2037"/></g><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="317.2559" x="537.25" y="424.483">pollCommandStatus(commandId): Observable&lt;CommandStatus&gt;</text><g data-visibility-modifier="PRIVATE_METHOD"><rect fill="#F24D5C" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="527.25" y="430.981"/></g><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="191.1816" x="537.25" y="436.2603">mapStatusCode(code): CommandStatus</text></g><g class="entity" data-qualified-name="GMN39" data-source-line="139" id="ent0040"><path d="M6,119.0483 L6,199.7123 L226.9023,199.7123 L226.9023,129.0483 L216.9023,119.0483 L6,119.0483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M216.9023,119.0483 L216.9023,129.0483 L226.9023,129.0483 L216.9023,119.0483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="162.0996" x="12" y="133.7162">Maintains internal signals for list,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="176.2402" x="12" y="145.4936">selected gateway, and loading state.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="186.9678" x="12" y="157.2709">Exposes them as read-only Signal&lt;T&gt;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="174.7754" x="12" y="169.0483">via .asReadonly(). Normalizes status</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="199.9023" x="12" y="180.8256">from API (handles uppercase, camelCase,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="119.1113" x="12" y="192.603">paused/offline variants).</text></g><g class="entity" data-qualified-name="GMN42" data-source-line="148" id="ent0043"><path d="M2024.66,334.8183 L2024.66,415.4823 L2250.2498,415.4823 L2250.2498,344.8183 L2240.2498,334.8183 L2024.66,334.8183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2240.2498,334.8183 L2240.2498,344.8183 L2250.2498,344.8183 L2240.2498,334.8183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="166.3428" x="2030.66" y="349.4863">Sends config/firmware commands</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="147.8613" x="2030.66" y="361.2636">then polls status every 2s with</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="187.7588" x="2030.66" y="373.0409">5-minute timeout. Maps 304 to cache,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="152.2461" x="2030.66" y="384.8183">404/503 to timeout. Filters out</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="132.085" x="2030.66" y="396.5956">invalid fields from payload.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="204.5898" x="2030.66" y="408.373">Rejects commands with disallowed status.</text></g><g class="entity" data-qualified-name="GMN45" data-source-line="157" id="ent0046"><path d="M1806,328.9283 L1806,421.3697 L2016.8926,421.3697 L2016.8926,338.9283 L2006.8926,328.9283 L1806,328.9283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2006.8926,328.9283 L2006.8926,338.9283 L2016.8926,338.9283 L2006.8926,328.9283" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="185.8203" x="1812" y="343.5963">Most complex page in the application.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="188.0762" x="1812" y="355.3736">Combines: gateway summary, rename,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="189.8926" x="1812" y="367.1509">command sending (config + firmware),</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="154.2529" x="1812" y="378.9283">delete confirmation, sensor list,</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="168.3984" x="1812" y="390.7056">and live telemetry stream. Handles</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="183.8721" x="1812" y="402.483">impersonation checks and role-based</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="61.8799" x="1812" y="414.2603">permissions.</text></g><!--link GatewayListPage to GatewayCard--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="115" id="lnk13"><path codeLine="115" d="M746.18,159.3683 C822.59,159.3683 923.68,159.3683 923.68,159.3683 C923.68,159.3683 923.68,386.5183 923.68,485.7983" fill="none" id="GatewayListPage-to-GatewayCard" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="923.68,491.7983,927.68,482.7983,923.68,486.7983,919.68,482.7983,923.68,491.7983" style="stroke:#181818;stroke-width:1;"/></g><!--link GatewayListPage to GatewaySvc--><g class="link" data-entity-1="ent0003" data-entity-2="ent0011" data-link-type="dependency" data-source-line="116" id="lnk14"><path codeLine="116" d="M662.45,209.2183 C662.45,248.3883 662.45,296.3683 662.45,296.3683 C662.45,296.3683 589.18,296.3683 517.19,296.3683" fill="none" id="GatewayListPage-to-GatewaySvc" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="511.19,2