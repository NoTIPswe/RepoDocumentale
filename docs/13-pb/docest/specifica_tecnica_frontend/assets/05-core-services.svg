18;stroke-width:0.5;" x1="444.59" x2="569.1545" y1="415.9283" y2="415.9283"/></g><!--class TelemetryEnvelope--><g class="entity" data-qualified-name="Core Services.TelemetryEnvelope" data-source-line="106" id="ent0022"><rect fill="#F1F1F1" height="44" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="119.5918" x="316.08" y="379.9283"/><ellipse cx="329.08" cy="393.9283" fill="#ADD1B2" rx="9" ry="9" style="stroke:#181818;stroke-width:1;"/><path d="M330.3583,397.7183 Q330.0165,397.8941 329.6405,397.982 Q329.2646,398.0699 328.8495,398.0699 Q327.3749,398.0699 326.5986,397.0982 Q325.8222,396.1265 325.8222,394.2906 Q325.8222,392.4498 326.5986,391.4781 Q327.3749,390.5064 328.8495,390.5064 Q329.2646,390.5064 329.6454,390.5943 Q330.0263,390.6822 330.3583,390.858 L330.3583,392.4595 Q329.9872,392.1177 329.6381,391.959 Q329.289,391.8004 328.9179,391.8004 Q328.1269,391.8004 327.724,392.4278 Q327.3212,393.0552 327.3212,394.2906 Q327.3212,395.5211 327.724,396.1485 Q328.1269,396.7759 328.9179,396.7759 Q329.289,396.7759 329.6381,396.6172 Q329.9872,396.4586 330.3583,396.1168 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="91.5918" x="341.08" y="397.7076">TelemetryEnvelope</text><line style="stroke:#181818;stroke-width:0.5;" x1="317.08" x2="434.6718" y1="407.9283" y2="407.9283"/><line style="stroke:#181818;stroke-width:0.5;" x1="317.08" x2="434.6718" y1="415.9283" y2="415.9283"/></g><g class="entity" data-qualified-name="GMN24" data-source-line="110" id="ent0025"><path d="M6,101.3783 L6,229.1517 L283.748,229.1517 L283.748,111.3783 L273.748,101.3783 L6,101.3783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M273.748,101.3783 L273.748,111.3783 L283.748,111.3783 L273.748,101.3783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="186.4111" x="12" y="116.0463">Implements both SessionLifeCycle and</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="153.6328" x="12" y="127.8236">ImpersonationStatus interfaces.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="174.5508" x="12" y="139.6009">Provided as SESSION_LIFECYCLE and</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="240.7178" x="12" y="151.3783">IMPERSONATION_STATUS tokens in app.config.ts.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="141.6455" x="12" y="163.1556">Uses Angular inject() pattern.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="184.0674" x="12" y="174.933">Signal-based state for impersonation.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="193.833" x="12" y="186.7103">sessionStorage for impersonation token</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="58.418" x="12" y="198.4877">persistence.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="210.4102" x="12" y="210.265">startImpersonation() calls management-api</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="256.748" x="12" y="222.0423">/auth/impersonate and returns Observable&lt;string&gt;.</text></g><g class="entity" data-qualified-name="GMN27" data-source-line="123" id="ent0028"><path d="M1390.5,113.1583 L1390.5,217.377 L1639.249,217.377 L1639.249,123.1583 L1629.249,113.1583 L1390.5,113.1583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1629.249,113.1583 L1629.249,123.1583 L1639.249,123.1583 L1629.249,113.1583" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="163.9258" x="1396.5" y="127.8263">Manages SSE connection lifecycle:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="182.8711" x="1396.5" y="139.6036">- Creates AbortController per session</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="227.749" x="1396.5" y="151.3809">- Tracks streamSessionId to prevent stale subs</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="226.8066" x="1396.5" y="163.1583">- Parses SSE messages into TelemetryEnvelope</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="221.8018" x="1396.5" y="174.9356">- Handles token expiry, malformed messages</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="200.835" x="1396.5" y="186.713">- Emits envelopes via ObservableChannel</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="189.2627" x="1396.5" y="198.4903">- Uses @microsoft/fetch-event-source</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="213.584" x="1396.5" y="210.2677">- Detects application 'token_expired' events</text></g><g class="entity" data-qualified-name="GMN30" data-source-line="134" id="ent0031"><path d="M1391.02,367.4783 L1391.02,436.365 L1618.7192,436.365 L1618.7192,377.4783 L1608.7192,367.4783 L1391.02,367.4783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1608.7192,367.4783 L1608.7192,377.4783 L1618.7192,377.4783 L1608.7192,367.4783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="171.333" x="1397.02" y="382.1463">Starts immediately after AuthGuard</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="180.6592" x="1397.02" y="393.9236">validates user. Runs every 5 minutes.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="206.6992" x="1397.02" y="405.7009">Skips for system_admin or missing tenant.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="135.6982" x="1397.02" y="417.4783">Invalidates cache on logout.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="181.875" x="1397.02" y="429.2556">Error-resilient: keeps scheduler alive.</text></g><g class="entity" data-qualified-name="GMN33" data-source-line="142" id="ent0034"><path d="M1626.71,367.4783 L1626.71,436.365 L1841.045,436.365 L1841.045,377.4783 L1831.045,367.4783 L1626.71,367.4783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1831.045,367.4783 L1831.045,377.4783 L1841.045,377.4783 L1831.045,367.4783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="166.0547" x="1632.71" y="382.1463">Evaluates telemetry values against</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="180.3857" x="1632.71" y="393.9236">configured thresholds. Priority order:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="136.8408" x="1632.71" y="405.7009">1. Match by sensorId (exact)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="162.7539" x="1632.71" y="417.4783">2. Match by sensorType (fallback)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="193.335" x="1632.71" y="429.2556">3. No match -&gt; return false (in bounds)</text></g><!--reverse link SessionLifeCycle to AuthService--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="extension" data-source-line="95" id="lnk10"><path codeLine="95" d="M760.87,217.4183 C760.87,235.0283 760.87,239.7783 760.87,263.6383" fill="none" id="SessionLifeCycle-backto-AuthService" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="760.87,199.4183,754.87,217.4183,766.87,217.4183,760.87,199.4183" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link ImpersonationStatus to AuthService--><g class="link" data-entity-1="ent0005" data-entity-2="ent0003" data-link-type="extension" data-source-line="96" id="lnk11"><path codeLine="96" d="M856.52,223.4083 C856.52,240.0283 856.52,242.3683 856.52,263.5883" fill="none" id="ImpersonationStatus-backto-AuthService" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="856.52,205.4083,850.52,223.4083,862.52,223.4083,856.52,205.4083" style="stroke:#181818;stroke-width:1;"/></g><!--link AuthService to UserRole--><g class="link" data-entity-1="ent0003" data-entity-2="ent0012" data-link-type="dependency" data-source-line="98" id="lnk13"><path codeLine="98" d="M723.87,540.1783 C723.87,542.7983 723.87,539.2883 723.87,541.6283" fill="none" id="AuthService-to-UserRole" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="723.87,547.6283,727.87,538.6283,723.87,542.6283,719.87,538.6283,723.87,547.6283" style="stroke:#181818;stroke-width:1;"/></g><!--link ThresholdPrefetch to ThresholdSvc--><g class="link" data-entity-1="ent0007" data-entity-2="ent0008" data-link-type="dependency" data-source-line="100" id="lnk14"><path codeLine="100" d="M1234.87,221.0483 C1234.87,246.0583 1234.87,270.2983 1234.87,298.8283" fill="none" id="ThresholdPrefetch-to-ThresholdSvc" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1234.87,304.8283,1238.87,295.8283,1234.87,299.8283,1230.87,295.8283,1234.87,304.8283" style="stroke:#181818;stroke-width:1;"/></g><!--link ThresholdSvc to ThresholdModel--><g class="link" data-e