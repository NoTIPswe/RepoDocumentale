1077.3095,525.9464 Q1077.7246,525.9464 1078.1054,526.0343 Q1078.4863,526.1222 1078.8183,526.298 L1078.8183,527.8995 Q1078.4472,527.5577 1078.0981,527.399 Q1077.749,527.2404 1077.3779,527.2404 Q1076.5869,527.2404 1076.184,527.8678 Q1075.7812,528.4952 1075.7812,529.7306 Q1075.7812,530.9611 1076.184,531.5885 Q1076.5869,532.2159 1077.3779,532.2159 Q1077.749,532.2159 1078.0981,532.0572 Q1078.4472,531.8986 1078.8183,531.5568 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="92.6709" x="1089.54" y="533.1476">DecryptedEnvelope</text><line style="stroke:#181818;stroke-width:0.5;" x1="1065.54" x2="1184.2109" y1="543.3683" y2="543.3683"/><line style="stroke:#181818;stroke-width:0.5;" x1="1065.54" x2="1184.2109" y1="551.3683" y2="551.3683"/></g><!--class TelemetryEnvelope--><g class="entity" data-qualified-name="Core Services.TelemetryEnvelope" data-source-line="134" id="ent0021"><rect fill="#F1F1F1" height="44" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="119.5918" x="435.08" y="515.3683"/><ellipse cx="448.08" cy="529.3683" fill="#ADD1B2" rx="9" ry="9" style="stroke:#181818;stroke-width:1;"/><path d="M449.3583,533.1583 Q449.0165,533.3341 448.6405,533.422 Q448.2646,533.5099 447.8495,533.5099 Q446.3749,533.5099 445.5986,532.5382 Q444.8222,531.5665 444.8222,529.7306 Q444.8222,527.8898 445.5986,526.9181 Q446.3749,525.9464 447.8495,525.9464 Q448.2646,525.9464 448.6454,526.0343 Q449.0263,526.1222 449.3583,526.298 L449.3583,527.8995 Q448.9872,527.5577 448.6381,527.399 Q448.289,527.2404 447.9179,527.2404 Q447.1269,527.2404 446.724,527.8678 Q446.3212,528.4952 446.3212,529.7306 Q446.3212,530.9611 446.724,531.5885 Q447.1269,532.2159 447.9179,532.2159 Q448.289,532.2159 448.6381,532.0572 Q448.9872,531.8986 449.3583,531.5568 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="91.5918" x="460.08" y="533.1476">TelemetryEnvelope</text><line style="stroke:#181818;stroke-width:0.5;" x1="436.08" x2="553.6718" y1="543.3683" y2="543.3683"/><line style="stroke:#181818;stroke-width:0.5;" x1="436.08" x2="553.6718" y1="551.3683" y2="551.3683"/></g><g class="entity" data-qualified-name="GMN24" data-source-line="139" id="ent0025"><path d="M6,124.9383 L6,240.9344 L283.748,240.9344 L283.748,134.9383 L273.748,124.9383 L6,124.9383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M273.748,124.9383 L273.748,134.9383 L283.748,134.9383 L273.748,124.9383" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="186.4111" x="12" y="139.6063">Implements both SessionLifeCycle and</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="153.6328" x="12" y="151.3836">ImpersonationStatus interfaces.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="174.5508" x="12" y="163.1609">Provided as SESSION_LIFECYCLE and</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="240.7178" x="12" y="174.9383">IMPERSONATION_STATUS tokens in app.config.ts.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="141.6455" x="12" y="186.7156">Uses Angular inject() pattern.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="184.0674" x="12" y="198.493">Signal-based state for impersonation.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="255.415" x="12" y="210.2703">sessionStorage for impersonation token persistence.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="210.4102" x="12" y="222.0477">startImpersonation() calls management-api</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="256.748" x="12" y="233.825">/auth/impersonate and returns Observable&lt;string&gt;.</text></g><g class="entity" data-qualified-name="GMN27" data-source-line="151" id="ent0028"><path d="M1573.5,130.8183 L1573.5,235.037 L1822.249,235.037 L1822.249,140.8183 L1812.249,130.8183 L1573.5,130.8183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1812.249,130.8183 L1812.249,140.8183 L1822.249,140.8183 L1812.249,130.8183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="163.9258" x="1579.5" y="145.4863">Manages SSE connection lifecycle:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="182.8711" x="1579.5" y="157.2636">- Creates AbortController per session</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="227.749" x="1579.5" y="169.0409">- Tracks streamSessionId to prevent stale subs</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="226.8066" x="1579.5" y="180.8183">- Parses SSE messages into TelemetryEnvelope</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="221.8018" x="1579.5" y="192.5956">- Handles token expiry, malformed messages</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="200.835" x="1579.5" y="204.373">- Emits envelopes via ObservableChannel</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="189.2627" x="1579.5" y="216.1503">- Uses @microsoft/fetch-event-source</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="213.584" x="1579.5" y="227.9277">- Detects application 'token_expired' events</text></g><g class="entity" data-qualified-name="GMN30" data-source-line="162" id="ent0031"><path d="M1574.02,502.9183 L1574.02,571.805 L1801.7192,571.805 L1801.7192,512.9183 L1791.7192,502.9183 L1574.02,502.9183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1791.7192,502.9183 L1791.7192,512.9183 L1801.7192,512.9183 L1791.7192,502.9183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="171.333" x="1580.02" y="517.5863">Starts immediately after AuthGuard</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="180.6592" x="1580.02" y="529.3636">validates user. Runs every 5 minutes.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="206.6992" x="1580.02" y="541.1409">Skips for system_admin or missing tenant.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="135.6982" x="1580.02" y="552.9183">Invalidates cache on logout.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="181.875" x="1580.02" y="564.6956">Error-resilient: keeps scheduler alive.</text></g><g class="entity" data-qualified-name="GMN33" data-source-line="170" id="ent0034"><path d="M1830.71,148.4883 L1830.71,217.375 L2045.045,217.375 L2045.045,158.4883 L2035.045,148.4883 L1830.71,148.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2035.045,148.4883 L2035.045,158.4883 L2045.045,158.4883 L2035.045,148.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="166.0547" x="1836.71" y="163.1563">Evaluates telemetry values against</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="180.3857" x="1836.71" y="174.9336">configured thresholds. Priority order:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="136.8408" x="1836.71" y="186.7109">1. Match by sensorId (exact)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="162.7539" x="1836.71" y="198.4883">2. Match by sensorType (fallback)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="193.335" x="1836.71" y="210.2656">3. No match -&gt; return false (in bounds)</text></g><!--reverse link SessionLifeCycle to AuthService--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="extension" data-source-line="123" id="lnk10"><path codeLine="123" d="M900.34,234.9183 C900.34,255.9683 900.34,267.0783 900.34,299.2283" fill="none" id="SessionLifeCycle-backto-AuthService" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="900.34,216.9183,894.34,234.9183,906.34,234.9183,900.34,216.9183" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link ImpersonationStatus to AuthService--><g class="link" data-entity-1="ent0005" data-entity-2="ent0003" data-link-type="extension" data-source-line="124" id="lnk11"><path codeLine="124" d="M775.87,229.0383 C775.87,250.3283 775.87,263.8383 775.87,299.0183" fill="none" id="ImpersonationStatus-backto-AuthService" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="775.87,211.0383,769.87,229.0383,781.87,229.0383,775.87,211.0383" style="stroke:#181818;stroke-width:1;"/></g><!--link AuthService to UserRole--><g class="link" data-entity-1="ent0003" data-entity-2="ent0012" data-link-type="dependency" data-source-line="126" id="lnk13"><path codeLine="126" d="M775.87,775.6583 C775.87,778.2183 775.87,774.6483 775.87,776.9283" fill="none" id="AuthService-to-UserRole" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="775.87,782.9283,779.87,773.9283,775.87,777.9283,771.87,773.9283,775.87,782.9283" style="stroke:#181818;s