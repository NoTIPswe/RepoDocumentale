.3095,525.9464 Q1094.7246,525.9464 1095.1054,526.0343 Q1095.4863,526.1222 1095.8183,526.298 L1095.8183,527.8995 Q1095.4472,527.5577 1095.0981,527.399 Q1094.749,527.2404 1094.3779,527.2404 Q1093.5869,527.2404 1093.184,527.8678 Q1092.7812,528.4952 1092.7812,529.7306 Q1092.7812,530.9611 1093.184,531.5885 Q1093.5869,532.2159 1094.3779,532.2159 Q1094.749,532.2159 1095.0981,532.0572 Q1095.4472,531.8986 1095.8183,531.5568 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="92.6709" x="1106.54" y="533.1476">DecryptedEnvelope</text><line style="stroke:#181818;stroke-width:0.5;" x1="1082.54" x2="1201.2109" y1="543.3683" y2="543.3683"/><line style="stroke:#181818;stroke-width:0.5;" x1="1082.54" x2="1201.2109" y1="551.3683" y2="551.3683"/></g><!--class TelemetryEnvelope--><g class="entity" data-qualified-name="Core Services.TelemetryEnvelope" data-source-line="133" id="ent0021"><rect fill="#F1F1F1" height="44" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="119.5918" x="437.08" y="515.3683"/><ellipse cx="450.08" cy="529.3683" fill="#ADD1B2" rx="9" ry="9" style="stroke:#181818;stroke-width:1;"/><path d="M451.3583,533.1583 Q451.0165,533.3341 450.6405,533.422 Q450.2646,533.5099 449.8495,533.5099 Q448.3749,533.5099 447.5986,532.5382 Q446.8222,531.5665 446.8222,529.7306 Q446.8222,527.8898 447.5986,526.9181 Q448.3749,525.9464 449.8495,525.9464 Q450.2646,525.9464 450.6454,526.0343 Q451.0263,526.1222 451.3583,526.298 L451.3583,527.8995 Q450.9872,527.5577 450.6381,527.399 Q450.289,527.2404 449.9179,527.2404 Q449.1269,527.2404 448.724,527.8678 Q448.3212,528.4952 448.3212,529.7306 Q448.3212,530.9611 448.724,531.5885 Q449.1269,532.2159 449.9179,532.2159 Q450.289,532.2159 450.6381,532.0572 Q450.9872,531.8986 451.3583,531.5568 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="91.5918" x="462.08" y="533.1476">TelemetryEnvelope</text><line style="stroke:#181818;stroke-width:0.5;" x1="438.08" x2="555.6718" y1="543.3683" y2="543.3683"/><line style="stroke:#181818;stroke-width:0.5;" x1="438.08" x2="555.6718" y1="551.3683" y2="551.3683"/></g><g class="entity" data-qualified-name="GMN24" data-source-line="138" id="ent0025"><path d="M6,124.9383 L6,240.9344 L283.748,240.9344 L283.748,134.9383 L273.748,124.9383 L6,124.9383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M273.748,124.9383 L273.748,134.9383 L283.748,134.9383 L273.748,124.9383" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="186.4111" x="12" y="139.6063">Implements both SessionLifeCycle and</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="153.6328" x="12" y="151.3836">ImpersonationStatus interfaces.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="174.5508" x="12" y="163.1609">Provided as SESSION_LIFECYCLE and</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="240.7178" x="12" y="174.9383">IMPERSONATION_STATUS tokens in app.config.ts.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="141.6455" x="12" y="186.7156">Uses Angular inject() pattern.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="184.0674" x="12" y="198.493">Signal-based state for impersonation.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="255.415" x="12" y="210.2703">sessionStorage for impersonation token persistence.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="210.4102" x="12" y="222.0477">startImpersonation() calls management-api</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="256.748" x="12" y="233.825">/auth/impersonate and returns Observable&lt;string&gt;.</text></g><g class="entity" data-qualified-name="GMN27" data-source-line="150" id="ent0028"><path d="M1596.5,130.8183 L1596.5,235.037 L1845.249,235.037 L1845.249,140.8183 L1835.249,130.8183 L1596.5,130.8183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1835.249,130.8183 L1835.249,140.8183 L1845.249,140.8183 L1835.249,130.8183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="163.9258" x="1602.5" y="145.4863">Manages SSE connection lifecycle:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="182.8711" x="1602.5" y="157.2636">- Creates AbortController per session</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="227.749" x="1602.5" y="169.0409">- Tracks streamSessionId to prevent stale subs</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="226.8066" x="1602.5" y="180.8183">- Parses SSE messages into TelemetryEnvelope</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="221.8018" x="1602.5" y="192.5956">- Handles token expiry, malformed messages</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="200.835" x="1602.5" y="204.373">- Emits envelopes via ObservableChannel</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="189.2627" x="1602.5" y="216.1503">- Uses @microsoft/fetch-event-source</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="213.584" x="1602.5" y="227.9277">- Detects application 'token_expired' events</text></g><g class="entity" data-qualified-name="GMN30" data-source-line="161" id="ent0031"><path d="M1597.02,502.9183 L1597.02,571.805 L1824.7192,571.805 L1824.7192,512.9183 L1814.7192,502.9183 L1597.02,502.9183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1814.7192,502.9183 L1814.7192,512.9183 L1824.7192,512.9183 L1814.7192,502.9183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="171.333" x="1603.02" y="517.5863">Starts immediately after AuthGuard</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="180.6592" x="1603.02" y="529.3636">validates user. Runs every 5 minutes.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="206.6992" x="1603.02" y="541.1409">Skips for system_admin or missing tenant.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="135.6982" x="1603.02" y="552.9183">Invalidates cache on logout.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="181.875" x="1603.02" y="564.6956">Error-resilient: keeps scheduler alive.</text></g><g class="entity" data-qualified-name="GMN33" data-source-line="169" id="ent0034"><path d="M1853.71,148.4883 L1853.71,217.375 L2068.045,217.375 L2068.045,158.4883 L2058.045,148.4883 L1853.71,148.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2058.045,148.4883 L2058.045,158.4883 L2068.045,158.4883 L2058.045,148.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="166.0547" x="1859.71" y="163.1563">Evaluates telemetry values against</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="180.3857" x="1859.71" y="174.9336">configured thresholds. Priority order:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="136.8408" x="1859.71" y="186.7109">1. Match by sensorId (exact)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="162.7539" x="1859.71" y="198.4883">2. Match by sensorType (fallback)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="193.335" x="1859.71" y="210.2656">3. No match -&gt; return false (in bounds)</text></g><!--reverse link SessionLifeCycle to AuthService--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="extension" data-source-line="122" id="lnk10"><path codeLine="122" d="M909.36,234.9183 C909.36,255.9683 909.36,267.0783 909.36,299.2283" fill="none" id="SessionLifeCycle-backto-AuthService" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="909.36,216.9183,903.36,234.9183,915.36,234.9183,909.36,216.9183" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link ImpersonationStatus to AuthService--><g class="link" data-entity-1="ent0005" data-entity-2="ent0003" data-link-type="extension" data-source-line="123" id="lnk11"><path codeLine="123" d="M781.87,229.0383 C781.87,250.3283 781.87,263.8383 781.87,299.0183" fill="none" id="ImpersonationStatus-backto-AuthService" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="781.87,211.0383,775.87,229.0383,787.87,229.0383,781.87,211.0383" style="stroke:#181818;stroke-width:1;"/></g><!--link AuthService to UserRole--><g class="link" data-entity-1="ent0003" data-entity-2="ent0012" data-link-type="dependency" data-source-line="125" id="lnk13"><path codeLine="125" d="M781.87,775.6583 C781.87,778.2183 781.87,774.6483 781.87,776.9283" fill="none" id="AuthService-to-UserRole" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="781.87,782.9283,785.87,773.9283,781.87,777.9283,777.87,773.9283,781.87,782.9283" style="stroke:#181818;strok