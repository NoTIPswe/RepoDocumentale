2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="119.5918" x="300.06" y="326.9283"/><ellipse cx="313.06" cy="340.9283" fill="#ADD1B2" rx="9" ry="9" style="stroke:#181818;stroke-width:1;"/><path d="M314.3383,344.7183 Q313.9965,344.8941 313.6205,344.982 Q313.2446,345.0699 312.8295,345.0699 Q311.3549,345.0699 310.5786,344.0982 Q309.8022,343.1265 309.8022,341.2906 Q309.8022,339.4498 310.5786,338.4781 Q311.3549,337.5064 312.8295,337.5064 Q313.2446,337.5064 313.6254,337.5943 Q314.0063,337.6822 314.3383,337.858 L314.3383,339.4595 Q313.9672,339.1177 313.6181,338.959 Q313.269,338.8004 312.8979,338.8004 Q312.1069,338.8004 311.704,339.4278 Q311.3012,340.0552 311.3012,341.2906 Q311.3012,342.5211 311.704,343.1485 Q312.1069,343.7759 312.8979,343.7759 Q313.269,343.7759 313.6181,343.6172 Q313.9672,343.4586 314.3383,343.1168 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="91.5918" x="325.06" y="344.7076">TelemetryEnvelope</text><line style="stroke:#181818;stroke-width:0.5;" x1="301.06" x2="418.6518" y1="354.9283" y2="354.9283"/><line style="stroke:#181818;stroke-width:0.5;" x1="301.06" x2="418.6518" y1="362.9283" y2="362.9283"/></g><g class="entity" data-qualified-name="GMN24" data-source-line="98" id="ent0025"><path d="M6,107.2683 L6,187.9323 L267.7178,187.9323 L267.7178,117.2683 L257.7178,107.2683 L6,107.2683" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M257.7178,107.2683 L257.7178,117.2683 L267.7178,117.2683 L257.7178,107.2683" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="186.4111" x="12" y="121.9363">Implements both SessionLifeCycle and</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="153.6328" x="12" y="133.7136">ImpersonationStatus interfaces.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="174.5508" x="12" y="145.4909">Provided as SESSION_LIFECYCLE and</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="240.7178" x="12" y="157.2683">IMPERSONATION_STATUS tokens in app.config.ts.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="189.0234" x="12" y="169.0456">Uses sessionStorage for impersonation</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="89.0869" x="12" y="180.823">token persistence.</text></g><g class="entity" data-qualified-name="GMN27" data-source-line="107" id="ent0028"><path d="M1299.96,107.2683 L1299.96,187.9323 L1547.7666,187.9323 L1547.7666,117.2683 L1537.7666,107.2683 L1299.96,107.2683" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1537.7666,107.2683 L1537.7666,117.2683 L1547.7666,117.2683 L1537.7666,107.2683" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="163.9258" x="1305.96" y="121.9363">Manages SSE connection lifecycle:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="182.8711" x="1305.96" y="133.7136">- Creates AbortController per session</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="194.1016" x="1305.96" y="145.4909">- Tracks sessionId to prevent stale subs</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="226.8066" x="1305.96" y="157.2683">- Parses SSE messages into TelemetryEnvelope</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="221.8018" x="1305.96" y="169.0456">- Handles token expiry, malformed messages</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="166.5137" x="1305.96" y="180.823">- Emits envelopes via RxJS Subject</text></g><g class="entity" data-qualified-name="GMN30" data-source-line="116" id="ent0031"><path d="M1300.01,314.4883 L1300.01,383.375 L1527.7092,383.375 L1527.7092,324.4883 L1517.7092,314.4883 L1300.01,314.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1517.7092,314.4883 L1517.7092,324.4883 L1527.7092,324.4883 L1517.7092,314.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="171.333" x="1306.01" y="329.1563">Starts immediately after AuthGuard</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="180.6592" x="1306.01" y="340.9336">validates user. Runs every 5 minutes.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="206.6992" x="1306.01" y="352.7109">Skips for system_admin or missing tenant.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="135.6982" x="1306.01" y="364.4883">Invalidates cache on logout.</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="181.875" x="1306.01" y="376.2656">Error-resilient: keeps scheduler alive.</text></g><g class="entity" data-qualified-name="GMN33" data-source-line="124" id="ent0034"><path d="M1535.69,314.4883 L1535.69,383.375 L1750.025,383.375 L1750.025,324.4883 L1740.025,314.4883 L1535.69,314.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1740.025,314.4883 L1740.025,324.4883 L1750.025,324.4883 L1740.025,314.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="166.0547" x="1541.69" y="329.1563">Evaluates telemetry values against</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="180.3857" x="1541.69" y="340.9336">configured thresholds. Priority order:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="136.8408" x="1541.69" y="352.7109">1. Match by sensorId (exact)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="162.7539" x="1541.69" y="364.4883">2. Match by sensorType (fallback)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="193.335" x="1541.69" y="376.2656">3. No match -&gt; return false (in bounds)</text></g><!--reverse link SessionLifeCycle to AuthService--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="extension" data-source-line="83" id="lnk10"><path codeLine="83" d="M678.86,199.7583 C678.86,213.1083 678.86,211.2783 678.86,228.2483" fill="none" id="SessionLifeCycle-backto-AuthService" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="678.86,181.7583,672.86,199.7583,684.86,199.7583,678.86,181.7583" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link ImpersonationStatus to AuthService--><g class="link" data-entity-1="ent0005" data-entity-2="ent0003" data-link-type="extension" data-source-line="84" id="lnk11"><path codeLine="84" d="M778.51,205.3783 C778.51,217.6383 778.51,213.8283 778.51,228.6083" fill="none" id="ImpersonationStatus-backto-AuthService" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="778.51,187.3783,772.51,205.3783,784.51,205.3783,778.51,187.3783" style="stroke:#181818;stroke-width:1;"/></g><!--link AuthService to UserRole--><g class="link" data-entity-1="ent0003" data-entity-2="ent0012" data-link-type="dependency" data-source-line="86" id="lnk13"><path codeLine="86" d="M678.86,469.4683 C678.86,472.0583 678.86,468.5383 678.86,470.8783" fill="none" id="AuthService-to-UserRole" style="stroke:#181818;stroke-width:1;"/><polygon fill="#1818