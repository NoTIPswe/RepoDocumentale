000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="213.8672" x="895.65" y="763.8109">it uses forkJoin to fetch them in parallel and</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="208.54" x="895.65" y="775.5883">merges/sorts the results via mergeAlerts().</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="226.8018" x="895.65" y="787.3656">Contains robust JSON parsing logic for parsing</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="217.6123" x="895.65" y="799.143">both CamelCase and SnakeCase AlertDetails.</text></g><!--link AlertListPage to AlertFilterPanel--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="118" id="lnk9"><path codeLine="118" d="M983.34,254.9183 C1153.01,254.9183 1447.47,254.9183 1447.47,254.9183 C1447.47,254.9183 1447.47,343.3583 1447.47,422.6783" fill="none" id="AlertListPage-to-AlertFilterPanel" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1447.47,428.6783,1451.47,419.6783,1447.47,423.6783,1443.47,419.6783,1447.47,428.6783" style="stroke:#181818;stroke-width:1;"/></g><!--link AlertListPage to AlertService--><g class="link" data-entity-1="ent0003" data-entity-2="ent0008" data-link-type="dependency" data-source-line="119" id="lnk10"><path codeLine="119" d="M916.05,375.6483 C916.05,390.6483 916.05,399.9483 916.05,414.8583" fill="none" id="AlertListPage-to-AlertService" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="916.05,420.8583,920.05,411.8583,916.05,415.8583,912.05,411.8583,916.05,420.8583" style="stroke:#181818;stroke-width:1;"/></g><!--link AlertConfigPage to AlertConfigForm--><g class="link" data-entity-1="ent0004" data-entity-2="ent0006" data-link-type="dependency" data-source-line="121" id="lnk11"><path codeLine="121" d="M399.28,375.6483 C39